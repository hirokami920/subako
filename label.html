<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ラベル照合アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-50:#eff6ff;--blue-100:#dbeafe;--blue-200:#bfdbfe;
  --blue-400:#60a5fa;--blue-500:#3b82f6;--blue-600:#2563eb;--blue-700:#1d4ed8;--blue-800:#1e40af;
  --bg:#f0f5fa;--bg-card:#ffffff;
  --text:#1a2b3c;--text2:#5a7088;--text3:#94a8bc;
  --border:#d4e2f0;--border-light:#e8f0f8;
  --done:#16a34a;--done-bg:#dcfce7;--done-border:#86efac;
  --ng:#dc2626;--ng-bg:#fef2f2;--ng-border:#fca5a5;
  --pending:#2563eb;--pending-bg:#dbeafe;
  --empty:#edf2f7;
  --shadow:0 1px 3px rgba(30,64,120,0.08);
  --shadow-md:0 4px 12px rgba(30,64,120,0.1);
  --shadow-lg:0 10px 30px rgba(30,64,120,0.12);
  --radius:12px;--radius-sm:8px;
  --font-body:'Noto Sans JP',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}

/* === LAYOUT: fixed structure, never rebuilt === */
#app{display:flex;flex-direction:column;height:100vh}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--blue-700),var(--blue-600),var(--blue-500));
  padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(30,64,120,0.25);z-index:10;flex-wrap:wrap;
}
.header-title{font-size:22px;font-weight:900;color:#fff}
.header-chips{display:flex;gap:8px;flex:1;align-items:center}
.chip{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:4px 14px;font-size:14px;color:rgba(255,255,255,0.95);display:flex;align-items:center;gap:5px}
.chip .cv{font-family:var(--font-mono);font-weight:700;color:#fff}
.chip.hl{background:rgba(255,255,255,0.3)}
.hdr-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius-sm);padding:5px 12px;color:#fff;cursor:pointer;font-size:11px;font-family:var(--font-body);font-weight:600;text-decoration:none}

/* PROGRESS */
.progress-section{padding:8px 20px;flex-shrink:0;background:var(--bg-card);border-bottom:1px solid var(--border-light)}
.progress-bar-outer{background:#d1fae5;border-radius:20px;height:28px;position:relative;overflow:hidden;border:1px solid #86efac}
.progress-bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#15803d,#16a34a,#22c55e);transition:width 0.6s;position:relative}
.progress-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:14px;color:#14532d;text-shadow:0 0 8px rgba(255,255,255,0.8);z-index:1}

/* TOP AREA: result + scan inputs */
.top-area{
  flex-shrink:0;display:flex;align-items:stretch;gap:16px;
  padding:12px 20px;background:var(--bg-card);border-bottom:1px solid var(--border-light);
}
.result-box{
  width:200px;flex-shrink:0;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  font-size:72px;font-weight:900;letter-spacing:4px;transition:all 0.3s;
}
.result-box.idle{background:var(--empty);color:var(--text3);font-size:18px;font-weight:700}
.result-box.ok{background:var(--done-bg);color:var(--done);border:3px solid var(--done-border);animation:flashOk 0.4s}
.result-box.ng{background:var(--ng-bg);color:var(--ng);border:3px solid var(--ng-border);animation:flashNg 0.4s}
@keyframes flashOk{0%,50%{background:#bbf7d0}100%{background:var(--done-bg)}}
@keyframes flashNg{0%,30%,60%{background:#fecaca}15%,45%{background:var(--ng-bg)}100%{background:var(--ng-bg)}}

.scan-area{flex:1;display:flex;flex-direction:column;gap:6px;justify-content:center}
.scan-row{display:flex;align-items:center;gap:8px}
.scan-row-label{font-size:13px;font-weight:700;color:var(--text);width:90px;flex-shrink:0;text-align:right}
.scan-input{
  flex:1;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);
  font-family:var(--font-mono);font-size:18px;font-weight:700;color:var(--text);
  background:var(--bg);transition:all 0.2s;min-width:0;
}
.scan-input:focus{outline:none;border-color:var(--blue-500);box-shadow:0 0 0 3px var(--blue-100);background:#fff}
.scan-input.filled{border-color:var(--done);background:var(--done-bg);color:var(--done)}
.scan-msg{font-size:13px;font-weight:700;text-align:center;min-height:20px}
.scan-msg.ng{color:var(--ng)}
.scan-msg.ok{color:var(--done)}
.scan-hint{font-size:10px;color:var(--text3);text-align:center}
.last-info{font-family:var(--font-mono);font-size:12px;color:var(--text3);text-align:center}

/* BOTTOM: lists side by side */
.bottom-area{flex:1;display:flex;overflow:hidden}
.list-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px 16px}
.list-panel:first-child{border-right:1px solid var(--border-light)}
.list-header{font-size:16px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.list-header .count{font-family:var(--font-mono);font-size:14px;font-weight:700;padding:2px 10px;border-radius:10px}
.before-header{color:var(--pending)}
.before-header .count{background:var(--pending-bg);color:var(--pending)}
.after-header{color:var(--done)}
.after-header .count{background:var(--done-bg);color:var(--done)}
.list-scroll{flex:1;overflow-y:auto}
table.lt{width:100%;border-collapse:collapse}
table.lt th{position:sticky;top:0;background:var(--bg);padding:5px 8px;text-align:left;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border);font-size:12px}
table.lt td{padding:5px 8px;border-bottom:1px solid var(--border-light);font-family:var(--font-mono);font-size:14px;font-weight:600}
table.lt tr.just-matched{animation:hlRow 2s}
@keyframes hlRow{0%{background:#bbf7d0}100%{background:transparent}}
.time-col{color:var(--text3);font-size:11px}

/* COMPLETE */
.complete-display{
  position:fixed;inset:0;background:rgba(22,163,74,0.95);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  z-index:100;color:#fff;animation:fadeIn 0.5s;
}
.complete-display .big{font-size:120px;font-weight:900}
.complete-display .sub{font-size:24px;margin-top:12px;font-weight:700}
.complete-close{margin-top:24px;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);border-radius:var(--radius);padding:12px 32px;color:#fff;cursor:pointer;font-size:16px;font-weight:700;font-family:var(--font-body)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* SETUP / LOADING / NODATA */
.overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1000}
.overlay-setup{background:linear-gradient(135deg,var(--blue-50),#fff,var(--blue-100))}
.overlay-loading{background:rgba(255,255,255,0.9)}
.setup-card{background:var(--bg-card);border-radius:20px;padding:40px;text-align:center;box-shadow:var(--shadow-lg);border:1px solid var(--border);max-width:520px;width:92%}
.setup-card h2{font-size:22px;font-weight:900;color:var(--blue-700);margin-bottom:8px}
.setup-card p{color:var(--text2);font-size:13px;margin-bottom:20px;line-height:1.6}
.setup-card input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;color:var(--text);font-size:13px;font-family:var(--font-mono);margin-bottom:10px}
.setup-btn{background:linear-gradient(135deg,var(--blue-600),var(--blue-500));color:#fff;border:none;border-radius:var(--radius);padding:12px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-body);box-shadow:0 4px 14px rgba(37,99,235,0.35)}
.setup-result{margin-top:12px;font-size:12px;min-height:20px}
.spinner{width:40px;height:40px;border:4px solid var(--blue-100);border-top-color:var(--blue-500);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.nodata{flex-direction:column;gap:12px;color:var(--text2);text-align:center}
.nodata-icon{font-size:48px}

/* Mobile */
@media(max-width:900px){
  .top-area{flex-direction:column;gap:8px;padding:10px 12px}
  .result-box{width:100%;height:80px;font-size:52px}
  .scan-row-label{width:70px;font-size:11px}
  .scan-input{font-size:14px;padding:8px 10px}
  table.lt td{font-size:12px;padding:4px 6px}
  table.lt th{font-size:10px}
}
</style>
</head>
<body>
<!-- Static layout - only content changes, structure stays -->
<div id="app">
  <!-- Filled by JS on init -->
</div>

<script>
// ===== SOUND =====
const AC=window.AudioContext||window.webkitAudioContext;let ac=null;
function ga(){if(!ac)ac=new AC();return ac}
function playOk(){try{const c=ga();[523.25,659.25].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.3,c.currentTime+i*0.15);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+i*0.15+0.5);o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*0.15);o.stop(c.currentTime+i*0.15+0.5)})}catch(e){}}
function playNg(){try{const c=ga();for(let i=0;i<3;i++){const o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.value=220;g.gain.setValueAtTime(0.25,c.currentTime+i*0.15);g.gain.exponentialRampToValueAtTime(0.01,c.currentTime+i*0.15+0.12);o.connect(g);g.connect(c.destination);o.start(c.currentTime+i*0.15);o.stop(c.currentTime+i*0.15+0.12)}}catch(e){}}

// ===== CSV =====
function parseCSV(rows){
  const items=[];
  rows.forEach(row=>{
    const line=String(row[0]||'').replace(/"/g,'').trim();if(!line)return;
    const hi=line.indexOf('#');if(hi<0)return;
    const key=line.substring(0,hi).trim();
    const after=line.substring(hi+1);const ap=after.split(',');
    const date=ap[0]||'';const ci=(ap[1]||'').trim();
    let cart='',slot=-1;
    if(ci.includes('-')){const s=ci.split('-');cart=s[0];slot=parseInt(s[1])}else{cart=ci}
    items.push({key,full:line,date,cart,slot});
  });
  return items.length>0?items:null;
}

// ===== STATE =====
let phase='init',gasUrl='',items=null,verified=new Set(),verifiedList=[];
let lastKey=null,lastTime=null,showComplete=false;
try{gasUrl=localStorage.getItem('subako_gas_url')||''}catch(e){}

// ===== GAS =====
async function gasFetch(t){
  const sep=gasUrl.includes('?')?'&':'?';
  const r=await fetch(gasUrl+sep+'type='+t+'&t='+Date.now(),{redirect:'follow'});
  if(!r.ok)throw new Error('HTTP '+r.status);return r.json();
}
async function gasPost(body){
  try{await fetch(gasUrl,{method:'POST',redirect:'follow',body:JSON.stringify(body)})}catch(e){}
}
async function loadData(){
  try{
    const data=await gasFetch('csv');
    if(data&&data.status==='ok'&&data.data&&data.data.length>0){
      let rows=data.data;
      if(rows[0]&&String(rows[0][0]).includes('ラベル'))rows=rows.slice(1);
      items=parseCSV(rows);
    }
    if(!items){phase='nodata';renderPhase();return}
    // Load existing verifications
    try{
      const vd=await gasFetch('labelverify');
      if(Array.isArray(vd)&&vd.length>0){
        vd.forEach(row=>{
          const key=String(Array.isArray(row)?row[1]||'':row.key||'').trim();if(!key)return;
          const idx=items.findIndex((it,i)=>it.key===key&&!verified.has(i));
          if(idx>=0){verified.add(idx);verifiedList.unshift({index:idx,key,time:String(Array.isArray(row)?row[0]||'':'')})}
        });
      }
    }catch(e){}
    phase='app';renderPhase();
  }catch(e){phase='nodata';renderPhase()}
}

// ===== VERIFY =====
function doVerify(shisho,label){
  const sk=shisho.includes('#')?shisho.substring(0,shisho.indexOf('#')):shisho;
  const lk=label.includes('#')?label.substring(0,label.indexOf('#')):label;
  if(sk!==lk){showResult('ng','指示書とラベルが不一致');playNg();return}
  const idx=items.findIndex((it,i)=>it.key===sk&&!verified.has(i));
  if(idx<0){
    const ad=items.findIndex(it=>it.key===sk);
    showResult('ng',ad>=0&&verified.has(ad)?'照合済みです':'リストに存在しません');
    playNg();return;
  }
  verified.add(idx);
  const now=new Date().toLocaleString('ja-JP');
  verifiedList.unshift({index:idx,key:sk,time:now});
  lastKey=sk;lastTime=now;
  showResult('ok','');
  playOk();
  gasPost({action:'labelVerify',time:now,key:sk,shisho,label,result:'OK'});
  updateLists();updateProgress();
  if(verified.size>=items.length){showComplete=true;renderComplete()}
}

// ===== DOM REFERENCES (set once after buildApp) =====
let elResult,elMsg,elShisho,elLabel,elLastInfo,elBeforeBody,elAfterBody,elBeforeCount,elAfterCount,elProgressFill,elProgressText,elChipCount;

function buildApp(){
  const total=items.length,done=verified.size,pct=total>0?(done/total*100):0;
  // Extract packing date and cart count from items
  const now=new Date();
  const issueDate=now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0');
  let packDate='';
  const cartSet=new Set();
  items.forEach(it=>{
    if(!packDate&&it.date&&it.date.length===8)packDate=it.date.slice(0,4)+'/'+it.date.slice(4,6)+'/'+it.date.slice(6,8);
    if(it.cart)cartSet.add(it.cart);
  });
  const cartCount=cartSet.size;

  document.getElementById('app').innerHTML=
    '<div class="header"><span class="header-title">ラベル照合</span>'+
    '<div class="header-chips">'+
    '<span class="chip">発行 <span class="cv">'+issueDate+'</span></span>'+
    (packDate?'<span class="chip">梱包 <span class="cv">'+packDate+'</span></span>':'')+
    '<span class="chip">台車 <span class="cv">'+cartCount+'台</span></span>'+
    '<span class="chip hl">製品 <span class="cv" id="chip-count">'+done+'/'+total+'本</span></span></div>'+
    '<a class="hdr-btn" href="index.html">🏠 TOP</a></div>'+

    '<div class="progress-section"><div class="progress-bar-outer">'+
    '<div class="progress-bar-fill" id="prog-fill" style="width:'+pct+'%"></div>'+
    '<div class="progress-text" id="prog-text">'+pct.toFixed(1)+'%　'+done+' / '+total+' 照合済み</div></div></div>'+

    '<div class="top-area">'+
    '<div class="result-box idle" id="result-box">待機中</div>'+
    '<div class="scan-area">'+
    '<div class="scan-row"><span class="scan-row-label">📋 指示書</span><input class="scan-input" id="shisho-input" placeholder="指示書をスキャン" autocomplete="off"></div>'+
    '<div class="scan-row"><span class="scan-row-label">🏷️ ラベル</span><input class="scan-input" id="label-input" placeholder="ラベルをスキャン" autocomplete="off"></div>'+
    '<div class="scan-msg" id="scan-msg"></div>'+
    '<div class="scan-hint">指示書 → ラベル の順にスキャン ／ Escでリセット</div>'+
    '<div class="last-info" id="last-info">'+(lastKey?'最新: '+esc(lastKey)+' ('+esc(lastTime)+')':'')+'</div>'+
    '</div></div>'+

    '<div class="bottom-area">'+
    '<div class="list-panel"><div class="list-header before-header">照合前 <span class="count" id="before-count">'+(total-done)+'</span></div>'+
    '<div class="list-scroll"><table class="lt"><thead><tr><th>品番</th><th>台車</th></tr></thead><tbody id="before-body"></tbody></table></div></div>'+
    '<div class="list-panel"><div class="list-header after-header">照合済み <span class="count" id="after-count">'+done+'</span></div>'+
    '<div class="list-scroll"><table class="lt"><thead><tr><th>品番</th><th>台車</th><th>時刻</th></tr></thead><tbody id="after-body"></tbody></table></div></div>'+
    '</div>';

  // Cache DOM refs
  elResult=document.getElementById('result-box');
  elMsg=document.getElementById('scan-msg');
  elShisho=document.getElementById('shisho-input');
  elLabel=document.getElementById('label-input');
  elLastInfo=document.getElementById('last-info');
  elBeforeBody=document.getElementById('before-body');
  elAfterBody=document.getElementById('after-body');
  elBeforeCount=document.getElementById('before-count');
  elAfterCount=document.getElementById('after-count');
  elProgressFill=document.getElementById('prog-fill');
  elProgressText=document.getElementById('prog-text');
  elChipCount=document.getElementById('chip-count');

  // Fill lists
  updateLists();

  // Setup input handlers (once!)
  elShisho.addEventListener('keydown',function(e){
    if(e.key==='Enter'){
      e.preventDefault();
      const v=elShisho.value.trim();if(!v)return;
      elShisho.classList.add('filled');
      elLabel.focus();
    }else if(e.key==='Escape'){e.preventDefault();resetAll()}
  });
  elLabel.addEventListener('keydown',function(e){
    if(e.key==='Enter'){
      e.preventDefault();
      const sv=elShisho.value.trim();
      const lv=elLabel.value.trim();
      if(!sv||!lv)return;
      doVerify(sv,lv);
      // Reset inputs
      elShisho.value='';elLabel.value='';
      elShisho.classList.remove('filled');
      elShisho.focus();
    }else if(e.key==='Escape'){e.preventDefault();resetAll()}
  });

  elShisho.focus();
}

function resetAll(){
  elShisho.value='';elLabel.value='';
  elShisho.classList.remove('filled');
  elResult.className='result-box idle';elResult.textContent='待機中';
  elMsg.textContent='';elMsg.className='scan-msg';
  elShisho.focus();
}

function showResult(type,msg){
  if(type==='ok'){
    elResult.className='result-box ok';elResult.textContent='OK';
    elMsg.className='scan-msg ok';elMsg.textContent='';
    if(lastKey)elLastInfo.textContent='最新: '+lastKey+' ('+lastTime+')';
  }else{
    elResult.className='result-box ng';elResult.textContent='NG';
    elMsg.className='scan-msg ng';elMsg.textContent=msg;
  }
}

function updateLists(){
  // Before list
  let bh='';
  items.forEach((it,i)=>{
    if(verified.has(i))return;
    bh+='<tr><td>'+esc(it.key)+'</td><td>'+esc(it.cart+(it.slot>0?'-'+it.slot:''))+'</td></tr>';
  });
  elBeforeBody.innerHTML=bh;
  elBeforeCount.textContent=items.length-verified.size;

  // After list
  let ah='';
  verifiedList.forEach((v,i)=>{
    const it=items[v.index];
    ah+='<tr'+(i===0?' class="just-matched"':'')+'><td>'+esc(v.key)+'</td><td>'+esc(it.cart+(it.slot>0?'-'+it.slot:''))+'</td><td class="time-col">'+esc(v.time)+'</td></tr>';
  });
  elAfterBody.innerHTML=ah;
  elAfterCount.textContent=verifiedList.length;
}

function updateProgress(){
  const total=items.length,done=verified.size,pct=total>0?(done/total*100):0;
  elProgressFill.style.width=pct+'%';
  elProgressText.textContent=pct.toFixed(1)+'%　'+done+' / '+total+' 照合済み';
  elChipCount.textContent=done+'/'+total+'本';
}

function renderComplete(){
  const d=document.createElement('div');
  d.className='complete-display';
  d.onclick=function(){d.remove();showComplete=false;elShisho.focus()};
  d.innerHTML='<div class="big">完了</div><div class="sub">全 '+items.length+' 件の照合が完了しました</div><button class="complete-close">閉じる</button>';
  document.body.appendChild(d);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ===== PHASE RENDERING =====
function renderPhase(){
  const app=document.getElementById('app');
  if(phase==='setup'){
    app.innerHTML='<div class="overlay overlay-setup"><div class="setup-card">'+
      '<h2>ラベル照合アプリ</h2><p>GAS URLを設定して接続してください</p>'+
      '<input type="text" id="setup-url" placeholder="https://script.google.com/macros/s/.../exec" value="'+esc(gasUrl)+'">'+
      '<button class="setup-btn" onclick="doConnect()">接続</button>'+
      '<div class="setup-result" id="setup-result"></div></div></div>';
  }else if(phase==='loading'){
    app.innerHTML='<div class="overlay overlay-loading"><div class="spinner"></div><div style="margin-top:12px;color:var(--text2);font-weight:600">データを読み込み中...</div></div>';
  }else if(phase==='nodata'){
    app.innerHTML='<div class="header"><span class="header-title">ラベル照合</span><div style="flex:1"></div><a class="hdr-btn" href="index.html">🏠 TOP</a></div>'+
      '<div class="overlay nodata" style="position:static;height:100%"><div class="nodata-icon">🏷️</div><div style="font-size:16px;font-weight:700">CSVデータがありません</div>'+
      '<div style="font-size:12px;color:var(--text3)">TOPページからCSVをアップロードしてください</div>'+
      '<a class="setup-btn" href="index.html" style="margin-top:12px;text-decoration:none;display:inline-block">TOPページへ</a></div>';
  }else if(phase==='app'){
    buildApp();
  }
}

async function doConnect(){
  const el=document.getElementById('setup-result');
  const url=(document.getElementById('setup-url')||{}).value||'';
  if(!url.trim()){el.innerHTML='<span style="color:#ef4444">URLを入力してください</span>';return}
  gasUrl=url.trim();
  try{localStorage.setItem('subako_gas_url',gasUrl)}catch(e){}
  el.innerHTML='<span style="color:var(--blue-500)">接続中...</span>';
  phase='loading';renderPhase();
  await loadData();
}
window.doConnect=doConnect;

// ===== INIT =====
if(gasUrl){phase='loading';renderPhase();loadData()}
else{phase='setup';renderPhase()}
</script>
</body>
</html>
