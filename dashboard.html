<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>巣箱照合ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-50:#eff6ff;--blue-100:#dbeafe;--blue-200:#bfdbfe;--blue-300:#93c5fd;
  --blue-400:#60a5fa;--blue-500:#3b82f6;--blue-600:#2563eb;--blue-700:#1d4ed8;
  --blue-800:#1e40af;
  --bg:#f0f5fa;--bg-card:#ffffff;
  --text:#1a2b3c;--text2:#5a7088;--text3:#94a8bc;
  --border:#d4e2f0;--border-light:#e8f0f8;
  --done:#16a34a;--done-bg:#dcfce7;--done-border:#86efac;
  --pending:#2563eb;--pending-bg:#dbeafe;--pending-border:#93c5fd;
  --active-orange:#f59e0b;--active-bg:#fef3c7;
  --empty:#edf2f7;
  --shadow:0 1px 3px rgba(30,64,120,0.08),0 1px 2px rgba(30,64,120,0.04);
  --shadow-md:0 4px 12px rgba(30,64,120,0.1),0 2px 4px rgba(30,64,120,0.06);
  --shadow-lg:0 10px 30px rgba(30,64,120,0.12);
  --radius:12px;--radius-sm:8px;--radius-xs:4px;
  --font-body:'Noto Sans JP',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--blue-700) 0%,var(--blue-600) 50%,var(--blue-500) 100%);
  padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(30,64,120,0.25);position:relative;z-index:10;flex-wrap:wrap;
}
.header-logo{display:flex;align-items:center;gap:10px}
.header-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:0.5px;white-space:nowrap}
.header-chips{display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex:1}
.chip{
  background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.25);
  border-radius:20px;padding:4px 14px;font-size:14px;color:rgba(255,255,255,0.95);
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.chip .cv{font-family:var(--font-mono);font-weight:700;color:#fff}
.chip.hl{background:rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.5)}
.header-actions{display:flex;gap:6px;margin-left:auto}
.hdr-btn{
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);
  border-radius:var(--radius-sm);padding:5px 12px;color:#fff;cursor:pointer;
  font-size:11px;font-family:var(--font-body);font-weight:600;transition:all 0.2s;
}
.hdr-btn:hover{background:rgba(255,255,255,0.3)}

/* PROGRESS */
.progress-section{padding:10px 20px;flex-shrink:0;background:var(--bg-card);border-bottom:1px solid var(--border-light)}
.progress-bar-outer{background:#d1fae5;border-radius:20px;height:32px;position:relative;overflow:hidden;border:1px solid #86efac}
.progress-bar-fill{
  height:100%;border-radius:20px;
  background:linear-gradient(90deg,#15803d,#16a34a,#22c55e);
  transition:width 0.8s cubic-bezier(0.22,1,0.36,1);position:relative;
}
.progress-bar-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 2.5s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.progress-text{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:700;font-size:15px;color:#14532d;
  text-shadow:0 0 8px rgba(255,255,255,0.8);z-index:1;
}
.progress-stats{display:flex;justify-content:space-between;margin-top:4px;font-size:13px;color:var(--text2);font-weight:600}

/* MAIN */
.main-area{display:flex;flex:1;overflow:hidden}

/* LEFT */
.left-panel{
  width:45%;max-width:680px;flex-shrink:0;overflow-y:auto;
  padding:16px 20px;background:var(--bg-card);border-right:1px solid var(--border-light);
  display:flex;flex-direction:column;
}
.current-label{font-size:14px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.current-header{display:flex;align-items:flex-end;gap:20px;margin-bottom:6px;flex-wrap:wrap}
.current-id{font-family:var(--font-mono);font-size:96px;font-weight:700;line-height:1;color:var(--blue-700)}
.current-meta{display:flex;flex-direction:column;gap:5px;padding-bottom:10px}
.current-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 16px;border-radius:20px;font-size:16px;font-weight:700}
.badge-active{background:var(--active-bg);color:var(--active-orange);border:1px solid #fcd34d}
.badge-done{background:var(--done-bg);color:var(--done);border:1px solid var(--done-border)}
.current-count{font-family:var(--font-mono);font-size:18px;color:var(--text2);font-weight:600}

/* Latest product info */
.latest-product{
  background:linear-gradient(135deg,var(--blue-50),#f0f7ff);
  border:1px solid var(--blue-200);border-radius:var(--radius-sm);
  padding:8px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.lp-label{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.lp-value{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--blue-800)}
.lp-slot{font-family:var(--font-mono);font-size:16px;color:var(--text2);font-weight:600}
.lp-time{font-size:12px;color:var(--text3);margin-left:auto}

/* Type2 */
.type2-box{background:var(--blue-50);border:1px solid var(--blue-200);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px}
.type2-title{font-size:13px;font-weight:700;color:var(--blue-700);margin-bottom:5px}
.type2-items{display:flex;flex-wrap:wrap;gap:4px}
.t2-chip{
  background:var(--pending-bg);border:1px solid var(--pending-border);
  border-radius:var(--radius-xs);padding:3px 8px;font-size:11px;font-family:var(--font-mono);
  color:var(--pending);font-weight:600;cursor:pointer;transition:all 0.15s;
}
.t2-chip.done{background:var(--done-bg);border-color:var(--done-border);color:var(--done)}

/* Large grid */
.grid-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
.grid-scroll{flex:1;overflow:auto}
.large-grid{display:grid;gap:2px}
.lcell{
  aspect-ratio:1;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:10px;font-weight:700;cursor:default;
  position:relative;transition:all 0.15s;
}
.lcell.empty{background:var(--empty)}
.lcell.pending{background:var(--pending-bg);color:var(--pending);border:1px solid var(--pending-border);cursor:pointer}
.lcell.done{background:var(--done-bg);color:var(--done);border:1px solid var(--done-border);cursor:pointer}
.lcell.pending:hover,.lcell.done:hover{transform:scale(1.12);z-index:2;box-shadow:var(--shadow-md)}
.lcell.pending:hover{background:#c7d8f4}
.lcell.done:hover{background:#bbf0cc}
.lcell .tip{display:none}
#gtip{
  position:fixed;background:var(--blue-800);color:#fff;border-radius:6px;padding:6px 12px;
  white-space:nowrap;font-size:12px;z-index:10000;box-shadow:var(--shadow-lg);pointer-events:none;
  display:none;
}

/* Cart selector */
.cart-selector{margin-top:10px;flex-shrink:0}
.cart-sel-title{font-size:13px;color:var(--text3);font-weight:600;margin-bottom:5px}
.cart-sel-row{display:flex;align-items:center;gap:8px}
.auto-toggle{
  display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);
  cursor:pointer;padding:3px 8px;border-radius:12px;border:1px solid var(--border);
  background:var(--bg);transition:all 0.2s;user-select:none;white-space:nowrap;
}
.auto-toggle.on{background:var(--blue-50);border-color:var(--blue-300);color:var(--blue-600)}
.cart-btns{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.cbtn{
  background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius-sm);
  padding:5px 14px;font-family:var(--font-mono);font-size:15px;font-weight:700;
  color:var(--text2);cursor:pointer;transition:all 0.2s;
}
.cbtn:hover{border-color:var(--blue-400);color:var(--blue-600)}
.cbtn.active{border-color:var(--blue-500);color:var(--blue-600);background:var(--blue-50);box-shadow:var(--shadow)}
.cbtn.cdone{border-color:var(--done);color:var(--done);background:var(--done-bg)}

/* RIGHT */
.right-panel{
  flex:1;overflow-y:auto;padding:12px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:10px;align-content:flex-start;background:var(--bg);
}
.mini-cart{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow);
}
.mini-cart:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.mini-cart.mc-done{border-color:var(--done-border);background:#f7fef9}
.mini-cart.mc-active{border-color:var(--blue-400);border-width:2px}
.mc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mc-id{font-family:var(--font-mono);font-size:17px;font-weight:700;color:var(--text)}
.mc-badge{font-size:9px;padding:2px 8px;border-radius:12px;font-weight:700}
.mcb-done{background:var(--done-bg);color:var(--done)}
.mcb-prog{background:var(--blue-50);color:var(--blue-600)}
.mc-stats{font-size:9px;color:var(--text3);margin-bottom:4px;font-family:var(--font-mono);font-weight:600}
.mini-grid{display:grid;gap:1px}
.mcell{aspect-ratio:1;border-radius:1px}
.mcell.empty{background:var(--empty)}
.mcell.pending{background:var(--blue-300)}
.mcell.done{background:var(--done)}

/* SETUP SCREEN (initial GAS URL config) */
.setup-screen{
  position:fixed;inset:0;background:linear-gradient(135deg,var(--blue-50),#fff,var(--blue-100));
  display:flex;align-items:center;justify-content:center;z-index:1000;
}
.setup-card{
  background:var(--bg-card);border-radius:20px;padding:40px;text-align:center;
  box-shadow:var(--shadow-lg);border:1px solid var(--border);max-width:520px;width:92%;
}
.setup-card h2{font-size:22px;font-weight:900;color:var(--blue-700);margin-bottom:8px}
.setup-card p{color:var(--text2);font-size:13px;margin-bottom:20px;line-height:1.6}
.setup-card input{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;color:var(--text);font-size:13px;font-family:var(--font-mono);margin-bottom:10px;
}
.setup-card input:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px var(--blue-100)}
.setup-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--blue-600),var(--blue-500));
  color:#fff;border:none;border-radius:var(--radius);padding:12px 32px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-body);
  box-shadow:0 4px 14px rgba(37,99,235,0.35);transition:all 0.2s;
}
.setup-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,99,235,0.45)}
.setup-result{margin-top:12px;font-size:12px;min-height:20px}
.setup-hint{font-size:10px;color:var(--text3);margin-top:8px;line-height:1.5}

/* Loading overlay */
.loading-overlay{
  position:fixed;inset:0;background:rgba(255,255,255,0.9);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;gap:12px;
}
.spinner{width:40px;height:40px;border:4px solid var(--blue-100);border-top-color:var(--blue-500);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text2);font-weight:600}

/* No data state */
.nodata{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:12px;color:var(--text2);
}
.nodata-icon{font-size:48px}
.nodata-text{font-size:16px;font-weight:700}
.nodata-sub{font-size:12px;color:var(--text3);text-align:center;line-height:1.6}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(30,58,95,0.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:var(--bg-card);border-radius:var(--radius);padding:28px;width:520px;max-width:92vw;box-shadow:var(--shadow-lg);border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.modal-box h3{font-size:17px;font-weight:800;color:var(--blue-700);margin-bottom:8px}
.modal-box .desc{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.modal-box input[type=text]{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--font-mono);margin-bottom:6px;
}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.mbtn{padding:8px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:13px;transition:all 0.15s}
.mbtn-save{background:var(--blue-600);color:#fff}
.mbtn-save:hover{background:var(--blue-700)}
.mbtn-cancel{background:var(--bg);color:var(--text2);border:1px solid var(--border) !important}

/* CSV upload area in modal */
.csv-drop{
  border:2px dashed var(--border);border-radius:var(--radius-sm);padding:20px;text-align:center;
  color:var(--text3);font-size:13px;cursor:pointer;transition:all 0.2s;margin-bottom:12px;
}
.csv-drop.over{border-color:var(--blue-400);background:var(--blue-50);color:var(--blue-600)}
.csv-drop input{display:none}
.csv-status{font-size:12px;margin-top:8px;min-height:18px}

/* POLL */
.poll-ind{
  position:fixed;bottom:6px;right:10px;font-size:9px;color:var(--text3);
  font-family:var(--font-mono);background:rgba(255,255,255,0.9);padding:2px 8px;
  border-radius:10px;border:1px solid var(--border-light);z-index:50;
}
.pdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px;vertical-align:middle}
.pdot.on{background:var(--done);animation:pulse 1.5s infinite}
.pdot.off{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* MOBILE */
@media(max-width:768px){
  .header{padding:8px 12px;gap:8px}
  .header-title{font-size:15px}
  .chip{font-size:10px;padding:2px 8px}
  .header-actions{display:none}
  .progress-section{padding:6px 12px}
  .progress-bar-outer{height:22px}
  .progress-text{font-size:11px}
  .main-area{flex-direction:column}
  .left-panel{width:100%;max-width:none;border-right:none;border-bottom:1px solid var(--border-light);padding:10px 12px;flex-shrink:0;flex:1}
  .current-id{font-size:52px}
  .lp-value{font-size:14px}
  .lcell{font-size:7px}
  .right-panel{padding:8px;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;flex:1}
  .mini-cart{padding:8px}
  .mc-id{font-size:14px}
  .cart-btns{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .cbtn{flex-shrink:0;padding:4px 12px;font-size:13px}
  .mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--bg-card);border-top:1px solid var(--border);
    padding:6px 8px;gap:6px;overflow-x:auto;z-index:50;
    box-shadow:0 -2px 10px rgba(30,64,120,0.08);-webkit-overflow-scrolling:touch;
  }
  .mnav-btn{
    flex-shrink:0;background:var(--bg);border:1.5px solid var(--border);
    border-radius:var(--radius-sm);padding:6px 14px;font-family:var(--font-mono);
    font-size:14px;font-weight:700;color:var(--text2);cursor:pointer;
    display:flex;flex-direction:column;align-items:center;gap:2px;
  }
  .mnav-btn.active{border-color:var(--blue-500);color:var(--blue-600);background:var(--blue-50)}
  .mnav-btn.ndone{border-color:var(--done);color:var(--done);background:var(--done-bg)}
  .mnav-pct{font-size:8px}
  .poll-ind{bottom:52px}
  .view-tabs{display:flex;background:var(--bg-card);border-bottom:1px solid var(--border-light);flex-shrink:0}
  .vtab{flex:1;text-align:center;padding:8px;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s}
  .vtab.active{color:var(--blue-600);border-bottom-color:var(--blue-500)}
  .left-panel.hm,.right-panel.hm{display:none !important}
}
@media(min-width:769px){.mobile-nav{display:none}.view-tabs{display:none}}

*::-webkit-scrollbar{width:5px;height:5px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>

<body>
<div id="app"></div>
<script>
// ============================================================
// CSV PARSING
// ============================================================
function parseCSVText(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(lines.length<2)return null;
  const items=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].replace(/"/g,'').trim();
    if(!line)continue;
    const hi=line.indexOf('#');
    if(hi<0)continue;
    const before=line.substring(0,hi),after=line.substring(hi+1);
    const pp=before.split(','),ap=after.split(',');
    const date=ap[0]||'',ci=(ap[1]||'').trim();
    let cart,slot,type;
    if(ci.includes('-')){const s=ci.split('-');cart=s[0];slot=parseInt(s[1]);type=1}
    else{cart=ci;slot=-1;type=2}
    items.push({product:pp[0]||'',num:pp[1]||'',date,cart,slot,type});
  }
  return items;
}

// Parse CSV rows from GAS (array of arrays, each row is [labelQR])
function parseCSVFromGAS(rows){
  const items=[];
  rows.forEach(row=>{
    const line=String(row[0]||'').replace(/"/g,'').trim();
    if(!line)return;
    const hi=line.indexOf('#');
    if(hi<0)return;
    const before=line.substring(0,hi),after=line.substring(hi+1);
    const pp=before.split(','),ap=after.split(',');
    const date=ap[0]||'',ci=(ap[1]||'').trim();
    let cart,slot,type;
    if(ci.includes('-')){const s=ci.split('-');cart=s[0];slot=parseInt(s[1]);type=1}
    else{cart=ci;slot=-1;type=2}
    items.push({product:pp[0]||'',num:pp[1]||'',date,cart,slot,type});
  });
  return items.length>0?items:null;
}

function buildCartData(items){
  const carts={};let date='';
  items.forEach(it=>{
    if(!date&&it.date)date=it.date;
    if(!carts[it.cart])carts[it.cart]={slots:{},type2:[],maxSlot:0};
    if(it.type===1){carts[it.cart].slots[it.slot]={product:it.product,num:it.num};if(it.slot>carts[it.cart].maxSlot)carts[it.cart].maxSlot=it.slot}
    else carts[it.cart].type2.push({product:it.product,num:it.num});
  });
  return{carts,date,totalItems:items.length};
}

// ============================================================
// STATE
// ============================================================
const S={
  cartData:null,selectedCart:null,verified:{},
  gasUrl:'',pollTimer:null,lastPoll:null,gasError:null,gasRows:0,
  phase:'init', // 'init' | 'setup' | 'loading' | 'nodata' | 'dashboard'
  showCsvModal:false,showSettingsModal:false,
  mobileView:'cart',autoFollow:true,
  lastVerifiedCart:null,lastVerifiedLabel:null,lastVerifiedSlot:null,lastVerifiedTime:null,
  csvUploading:false,
};
try{S.gasUrl=localStorage.getItem('subako_gas_url')||''}catch(e){}

// ============================================================
// GAS COMMUNICATION
// ============================================================
async function gasFetch(type){
  if(!S.gasUrl)return null;
  const sep=S.gasUrl.includes('?')?'&':'?';
  const url=S.gasUrl+sep+'type='+type+'&t='+Date.now();
  const r=await fetch(url,{redirect:'follow'});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function gasPost(body){
  if(!S.gasUrl)throw new Error('GAS URL未設定');
  const r=await fetch(S.gasUrl,{
    method:'POST',redirect:'follow',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(body)
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

// Load both CSV + verify data
async function loadAll(){
  try{
    const data=await gasFetch('both');
    // CSV data
    if(data.csv&&data.csv.status==='ok'&&data.csv.data&&data.csv.data.length>0){
      // First row might be header "ラベルQR"
      let rows=data.csv.data;
      if(rows[0]&&String(rows[0][0]).includes('ラベル'))rows=rows.slice(1);
      const items=parseCSVFromGAS(rows);
      if(items)S.cartData=buildCartData(items);
    }
    // Verify data
    if(data.verify){
      parseVerifyRows(data.verify);
    }
    S.gasError=null;
    S.lastPoll=new Date();
    if(S.cartData){
      S.phase='dashboard';
    }else{
      S.phase='nodata';
    }
  }catch(e){
    console.warn('loadAll error:',e);
    S.gasError=e.message;
    if(!S.cartData)S.phase='nodata';
  }
  render();
}

// Poll verify data only (every 5s)
async function pollVerify(){
  if(!S.gasUrl||!S.cartData)return;
  try{
    const data=await gasFetch('verify');
    if(Array.isArray(data)){
      parseVerifyRows(data);
      S.lastPoll=new Date();S.gasError=null;
      S.gasRows=data.length;
    }
    render();
  }catch(e){
    S.gasError=e.message;render();
  }
}

function parseVerifyRows(rows){
  const v={};
  let lastCart=null,lastLabel=null,lastSlot=null,lastTime=null;
  rows.forEach(row=>{
    let cartId=null,slotNum=null,productLabel=null,rowTime=null;
    if(Array.isArray(row)){
      rowTime=row[0]?String(row[0]):'';
      const label=String(row[3]||'').trim();
      productLabel=label;
      let m=label.match(/#\d{8},(\d+_\d+)(?:-(\d+))?/);
      if(m){cartId=m[1];slotNum=m[2]?parseInt(m[2]):null}
      if(!cartId){
        const rawCart=String(row[4]||'').trim();
        const rawSlot=String(row[5]||'').trim();
        const cm=rawCart.match(/(\d+_\d+)/);
        if(cm)cartId=cm[1];
        if(cartId){const rs=parseInt(rawSlot);if(!isNaN(rs)&&rs>0)slotNum=rs}
      }
      if(!cartId){
        const colB=String(row[1]||'').trim();
        const colC=String(row[2]||'').trim();
        const bm=colB.match(/(\d+_\d+)/);
        if(bm)cartId=bm[1];
        else{const am=String(row[3]||'').match(/(\d+_\d+)(?:-(\d+))?/);if(am){cartId=am[1];slotNum=am[2]?parseInt(am[2]):null}}
        if(cartId&&!slotNum){const cs=parseInt(colC);if(!isNaN(cs)&&cs>0)slotNum=cs}
      }
    }else if(typeof row==='object'){
      const label=row['製品ラベル']||row.label||row.qr||'';
      productLabel=String(label);
      let m=String(label).match(/#\d{8},(\d+_\d+)(?:-(\d+))?/);
      if(m){cartId=m[1];slotNum=m[2]?parseInt(m[2]):null}
    }
    if(cartId){
      if(!v[cartId])v[cartId]=new Set();
      if(slotNum!==null&&!isNaN(slotNum)&&slotNum>0)v[cartId].add(slotNum);
      else{let idx=0;while(v[cartId].has('t2-'+idx))idx++;v[cartId].add('t2-'+idx)}
      lastCart=cartId;lastSlot=slotNum;lastLabel=productLabel;lastTime=rowTime;
    }
  });
  S.verified=v;
  if(lastCart){
    S.lastVerifiedCart=lastCart;S.lastVerifiedSlot=lastSlot;S.lastVerifiedTime=lastTime;
    if(lastLabel){const hi=lastLabel.indexOf('#');S.lastVerifiedLabel=hi>0?lastLabel.substring(0,hi):lastLabel}
    if(S.autoFollow&&S.cartData&&S.cartData.carts[lastCart])S.selectedCart=lastCart;
  }
}

function startPoll(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  if(S.gasUrl)S.pollTimer=setInterval(pollVerify,5000);

// STATS
// ============================================================
function cartStats(cid){
  const c=S.cartData.carts[cid],skeys=Object.keys(c.slots);
  const t1=skeys.length,t2c=c.type2.length,total=t1+t2c;
  const vs=S.verified[cid]||new Set();
  let d1=0;skeys.forEach(s=>{if(vs.has(parseInt(s)))d1++});
  let d2=0;for(let i=0;i<t2c;i++){if(vs.has('t2-'+i))d2++}
  const done=d1+d2;
  return{t1,t2c,total,done,d1,d2,complete:done>=total&&total>0};
}
function allStats(){
  if(!S.cartData)return{tc:0,dc:0,ti:0,di:0};
  const ids=Object.keys(S.cartData.carts);
  let ti=0,di=0,dc=0;
  ids.forEach(id=>{const s=cartStats(id);ti+=s.total;di+=s.done;if(s.complete)dc++});
  return{tc:ids.length,dc,ti,di};
}
function sortC(ids){return ids.sort((a,b)=>{const[ar,ac]=a.split('_').map(Number);const[br,bc]=b.split('_').map(Number);return ar!==br?ar-br:ac-bc})}
function fmtD(d){if(!d||d.length!==8)return d;return d.slice(0,4)+'/'+d.slice(4,6)+'/'+d.slice(6,8)}

  },
  sel(cid){S.selectedCart=cid;S.autoFollow=false;render()},
  tog(cid,sk){
    if(!S.verified[cid])S.verified[cid]=new Set();
    const k=typeof sk==='string'?sk:parseInt(sk);
    if(S.verified[cid].has(k))S.verified[cid].delete(k);else S.verified[cid].add(k);

  },

  showCsv(){S.showCsvModal=true;render();setupCsvDrop()},

function setupCsvDrop(){
  setTimeout(()=>{
    const drop=document.getElementById('csv-drop');
    const fileIn=document.getElementById('csv-file');
    if(!drop||!fileIn)return;
    ['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();drop.classList.add('over')}));
    ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();drop.classList.remove('over')}));
    drop.addEventListener('drop',e=>{const f=e.dataTransfer.files;if(f.length>0)handleCSVFile(f[0])});
    fileIn.addEventListener('change',e=>{const f=e.target.files[0];if(f)handleCSVFile(f)});
  },100);
}

async function handleCSVFile(file){
  const statusEl=document.getElementById('csv-status');
  if(statusEl)statusEl.innerHTML='<span style="color:var(--blue-500)">読み込み中...</span>';
  const reader=new FileReader();
  reader.onload=async ev=>{
    const text=ev.target.result;
    const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
    if(lines.length<2){
      if(statusEl)statusEl.innerHTML='<span style="color:#ef4444">CSVデータが空です</span>';
      return;
    }
    // Validate
    const items=parseCSVText(text);
    if(!items||items.length===0){
      if(statusEl)statusEl.innerHTML='<span style="color:#ef4444">CSVの形式が正しくありません</span>';
      return;
    }
    if(statusEl)statusEl.innerHTML='<span style="color:var(--blue-500)">スプレッドシートにアップロード中... ('+lines.length+'行)</span>';
    // Upload to GAS
    try{
      const rows=lines.map(l=>[l]);
      const result=await gasPost({action:'uploadCSV',rows:rows});
      if(result.status==='ok'){
        if(statusEl)statusEl.innerHTML='<span style="color:var(--done)">✓ アップロード完了！ '+result.count+'行を保存しました</span>';
        // Reload data
        S.cartData=buildCartData(items);
        S.showCsvModal=false;
        S.phase='dashboard';
        startPoll();
        // Also fetch latest verify data
        await pollVerify();
        render();
      }else{
        if(statusEl)statusEl.innerHTML='<span style="color:#ef4444">エラー: '+(result.message||'不明')+'</span>';
      }
    }catch(e){
      if(statusEl)statusEl.innerHTML='<span style="color:#ef4444">アップロード失敗: '+e.message+'</span>';
    }
  };
  reader.readAsText(file,'Shift_JIS');
}

  gtip.style.display='block';
  const tipW=gtip.offsetWidth,tipH=gtip.offsetHeight;
  let left=rect.left+rect.width/2-tipW/2;
  if(left<4)left=4;
  if(left+tipW>window.innerWidth-4)left=window.innerWidth-tipW-4;
  gtip.style.left=left+'px';
  gtip.style.top=rect.top<100?(rect.bottom+6)+'px':(rect.top-tipH-6)+'px';
});
document.addEventListener('mouseout',function(e){
  const cell=e.target.closest('.lcell');
  if(cell&&e.relatedTarget&&cell.contains(e.relatedTarget))return;
  if(cell===tipTarget||!e.relatedTarget||!e.relatedTarget.closest||!e.relatedTarget.closest('.lcell')){
    gtip.style.display='none';tipTarget=null;
  }
});

// Hide tooltip on render
const _origRender=render;
function renderSafe(){gtip.style.display='none';tipTarget=null;_origRender()}
render=renderSafe;

// ============================================================
// INIT
// ============================================================
(async function(){
  if(S.gasUrl){
    S.phase='loading';render();
    await loadAll();
    startPoll();
  }else{
    S.phase='setup';render();
  }
})();
</script>
</body>
