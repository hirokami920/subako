<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>巣箱照合ダッシュボード</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue-50:#eff6ff;--blue-100:#dbeafe;--blue-200:#bfdbfe;--blue-300:#93c5fd;
  --blue-400:#60a5fa;--blue-500:#3b82f6;--blue-600:#2563eb;--blue-700:#1d4ed8;
  --blue-800:#1e40af;
  --bg:#f0f5fa;--bg-card:#ffffff;
  --text:#1a2b3c;--text2:#5a7088;--text3:#94a8bc;
  --border:#d4e2f0;--border-light:#e8f0f8;
  --done:#16a34a;--done-bg:#dcfce7;--done-border:#86efac;
  --pending:#2563eb;--pending-bg:#dbeafe;--pending-border:#93c5fd;
  --active-orange:#f59e0b;--active-bg:#fef3c7;
  --empty:#edf2f7;
  --shadow:0 1px 3px rgba(30,64,120,0.08),0 1px 2px rgba(30,64,120,0.04);
  --shadow-md:0 4px 12px rgba(30,64,120,0.1),0 2px 4px rgba(30,64,120,0.06);
  --shadow-lg:0 10px 30px rgba(30,64,120,0.12);
  --radius:12px;--radius-sm:8px;--radius-xs:4px;
  --font-body:'Noto Sans JP',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
.header{
  background:linear-gradient(135deg,var(--blue-700) 0%,var(--blue-600) 50%,var(--blue-500) 100%);
  padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(30,64,120,0.25);position:relative;z-index:10;flex-wrap:wrap;
}
.header-logo{display:flex;align-items:center;gap:10px}
.header-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:0.5px;white-space:nowrap}
.header-chips{display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex:1}
.chip{
  background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.25);
  border-radius:20px;padding:4px 14px;font-size:14px;color:rgba(255,255,255,0.95);
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.chip .cv{font-family:var(--font-mono);font-weight:700;color:#fff}
.chip.hl{background:rgba(255,255,255,0.3);border-color:rgba(255,255,255,0.5)}
.header-actions{display:flex;gap:6px;margin-left:auto}
.hdr-btn{
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);
  border-radius:var(--radius-sm);padding:5px 12px;color:#fff;cursor:pointer;
  font-size:11px;font-family:var(--font-body);font-weight:600;transition:all 0.2s;
}
.hdr-btn:hover{background:rgba(255,255,255,0.3)}

/* PACK DATE TABS */
.packdate-tabs{
  display:flex;gap:6px;padding:8px 20px;flex-shrink:0;
  background:var(--bg-card);border-bottom:1px solid var(--border-light);
  overflow-x:auto;align-items:center;
}
.packdate-tabs-label{font-size:11px;color:var(--text3);font-weight:700;margin-right:4px;flex-shrink:0}
.pd-tab{
  background:var(--bg);border:1px solid var(--border);color:var(--text2);
  border-radius:20px;padding:5px 14px;font-family:var(--font-mono);font-size:13px;font-weight:700;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0;
}
.pd-tab:hover{border-color:var(--blue-400);color:var(--blue-600)}
.pd-tab.active{background:var(--blue-600);color:#fff;border-color:var(--blue-600);box-shadow:0 2px 6px rgba(37,99,235,0.3)}
.pd-tab .pd-count{font-size:10px;opacity:0.85;margin-left:3px}
.pd-tab.working{background:var(--active-bg);color:var(--active-orange);border-color:#fcd34d}
.pd-tab.working.active{background:var(--active-orange);color:#fff;border-color:var(--active-orange)}

/* PROGRESS */
.progress-section{padding:10px 20px;flex-shrink:0;background:var(--bg-card);border-bottom:1px solid var(--border-light)}
.progress-bar-outer{background:#d1fae5;border-radius:20px;height:32px;position:relative;overflow:hidden;border:1px solid #86efac}
.progress-bar-fill{
  height:100%;border-radius:20px;
  background:linear-gradient(90deg,#15803d,#16a34a,#22c55e);
  transition:width 0.8s cubic-bezier(0.22,1,0.36,1);position:relative;
}
.progress-bar-fill::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 2.5s infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.progress-text{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:700;font-size:15px;color:#14532d;
  text-shadow:0 0 8px rgba(255,255,255,0.8);z-index:1;
}
.progress-stats{display:flex;justify-content:space-between;margin-top:4px;font-size:13px;color:var(--text2);font-weight:600}

/* MAIN */
.main-area{display:flex;flex:1;overflow:hidden}

/* LEFT */
.left-panel{
  width:45%;max-width:680px;flex-shrink:0;overflow-y:auto;
  padding:16px 20px;background:var(--bg-card);border-right:1px solid var(--border-light);
  display:flex;flex-direction:column;
}
.current-label{font-size:14px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.current-header{display:flex;align-items:flex-end;gap:20px;margin-bottom:6px;flex-wrap:wrap}
.current-id{font-family:var(--font-mono);font-size:96px;font-weight:700;line-height:1;color:var(--blue-700)}
.current-meta{display:flex;flex-direction:column;gap:5px;padding-bottom:10px}
.current-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 16px;border-radius:20px;font-size:16px;font-weight:700}
.badge-active{background:var(--active-bg);color:var(--active-orange);border:1px solid #fcd34d}
.badge-done{background:var(--done-bg);color:var(--done);border:1px solid var(--done-border)}
.current-count{font-family:var(--font-mono);font-size:18px;color:var(--text2);font-weight:600}

/* Latest product info */
.latest-product{
  background:linear-gradient(135deg,var(--blue-50),#f0f7ff);
  border:1px solid var(--blue-200);border-radius:var(--radius-sm);
  padding:8px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.lp-label{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
.lp-value{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--blue-800)}
.lp-slot{font-family:var(--font-mono);font-size:16px;color:var(--text2);font-weight:600}
.lp-time{font-size:12px;color:var(--text3);margin-left:auto}

/* Type2 */
.type2-box{background:var(--blue-50);border:1px solid var(--blue-200);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px}
.type2-title{font-size:13px;font-weight:700;color:var(--blue-700);margin-bottom:5px}
.type2-items{display:flex;flex-wrap:wrap;gap:4px}
.t2-chip{
  background:var(--pending-bg);border:1px solid var(--pending-border);
  border-radius:var(--radius-xs);padding:3px 8px;font-size:11px;font-family:var(--font-mono);
  color:var(--pending);font-weight:600;cursor:pointer;transition:all 0.15s;
}
.t2-chip.done{background:var(--done-bg);border-color:var(--done-border);color:var(--done)}

/* Large grid */
.grid-wrap{flex:1;display:flex;flex-direction:column;min-height:0}
.grid-scroll{flex:1;overflow:auto}
.large-grid{display:grid;gap:2px}
.lcell{
  aspect-ratio:1;border-radius:var(--radius-xs);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:10px;font-weight:700;cursor:default;
  position:relative;transition:all 0.15s;
}
.lcell.empty{background:var(--empty)}
.lcell.pending{background:var(--pending-bg);color:var(--pending);border:1px solid var(--pending-border);cursor:pointer}
.lcell.done{background:var(--done-bg);color:var(--done);border:1px solid var(--done-border);cursor:pointer}
.lcell.pending:hover,.lcell.done:hover{transform:scale(1.12);z-index:2;box-shadow:var(--shadow-md)}
.lcell.pending:hover{background:#c7d8f4}
.lcell.done:hover{background:#bbf0cc}
.lcell .tip{display:none}
#gtip{
  position:fixed;background:var(--blue-800);color:#fff;border-radius:6px;padding:6px 12px;
  white-space:nowrap;font-size:12px;z-index:10000;box-shadow:var(--shadow-lg);pointer-events:none;
  display:none;
}

/* Cart selector */
.cart-selector{margin-top:10px;flex-shrink:0}
.cart-sel-title{font-size:13px;color:var(--text3);font-weight:600;margin-bottom:5px}
.cart-sel-row{display:flex;align-items:center;gap:8px}
.auto-toggle{
  display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);
  cursor:pointer;padding:3px 8px;border-radius:12px;border:1px solid var(--border);
  background:var(--bg);transition:all 0.2s;user-select:none;white-space:nowrap;
}
.auto-toggle.on{background:var(--blue-50);border-color:var(--blue-300);color:var(--blue-600)}
.cart-btns{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.cbtn{
  background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius-sm);
  padding:5px 14px;font-family:var(--font-mono);font-size:15px;font-weight:700;
  color:var(--text2);cursor:pointer;transition:all 0.2s;
}
.cbtn:hover{border-color:var(--blue-400);color:var(--blue-600)}
.cbtn.active{border-color:var(--blue-500);color:var(--blue-600);background:var(--blue-50);box-shadow:var(--shadow)}
.cbtn.cdone{border-color:var(--done);color:var(--done);background:var(--done-bg)}

/* RIGHT */
.right-panel{
  flex:1;overflow-y:auto;padding:12px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:10px;align-content:flex-start;background:var(--bg);
}
.mini-cart{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:10px;cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow);
}
.mini-cart:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.mini-cart.mc-done{border-color:var(--done-border);background:#f7fef9}
.mini-cart.mc-active{border-color:var(--blue-400);border-width:2px}
.mc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mc-id{font-family:var(--font-mono);font-size:17px;font-weight:700;color:var(--text)}
.mc-badge{font-size:9px;padding:2px 8px;border-radius:12px;font-weight:700}
.mcb-done{background:var(--done-bg);color:var(--done)}
.mcb-prog{background:var(--blue-50);color:var(--blue-600)}
.mc-stats{font-size:9px;color:var(--text3);margin-bottom:4px;font-family:var(--font-mono);font-weight:600}
.mini-grid{display:grid;gap:1px}
.mcell{aspect-ratio:1;border-radius:1px}
.mcell.empty{background:var(--empty)}
.mcell.pending{background:var(--blue-300)}
.mcell.done{background:var(--done)}

/* ============================================================
   全台車 詳細横並び表示 (carts-detail)
   ============================================================ */
.dash-controls{
  display:flex;align-items:center;gap:10px;padding:6px 16px;flex-shrink:0;
  background:var(--bg-card);border-bottom:1px solid var(--border-light);
}
.dc-label{font-size:12px;color:var(--text2);font-weight:700}
.dash-controls .auto-toggle{margin-left:auto}

.carts-detail{
  flex:1;overflow:auto;padding:14px;background:var(--bg);
  display:flex;flex-wrap:wrap;gap:14px;align-content:flex-start;align-items:flex-start;
}
.cart-detail-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px;box-shadow:var(--shadow);flex:1 1 320px;min-width:280px;max-width:560px;
  display:flex;flex-direction:column;transition:border-color 0.2s,box-shadow 0.2s;
}
.cart-detail-card.cdc-done{border-color:var(--done-border);background:#f7fef9}
.cart-detail-card.cdc-active{border-color:var(--active-orange);border-width:2px;padding:11px;box-shadow:var(--shadow-md)}
.cdc-head{display:flex;align-items:center;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.cdc-id{font-family:var(--font-mono);font-size:46px;font-weight:700;line-height:1;color:var(--blue-700)}
.cart-detail-card.cdc-active .cdc-id{color:var(--active-orange)}
.cdc-meta{display:flex;flex-direction:column;gap:4px}
.cdc-grid-wrap{overflow:auto}

/* 最終照合セルの点滅ハイライト */
@keyframes blinkLatest{
  0%,100%{box-shadow:0 0 0 2px var(--active-orange),0 0 6px 2px rgba(245,158,11,0.5);background:#fde68a;color:#92400e}
  50%{box-shadow:0 0 0 4px rgba(245,158,11,0.4),0 0 12px 4px rgba(245,158,11,0.7);background:var(--done);color:#fff}
}
.lcell.latest{animation:blinkLatest 0.9s ease-in-out infinite;z-index:5;font-weight:700;border:none !important}
.t2-chip.latest{animation:blinkLatest 0.9s ease-in-out infinite;z-index:5}

/* 印刷ボタン */
.print-btn{
  background:var(--blue-600);color:#fff;border:none;border-radius:var(--radius-sm);
  padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-body);
  transition:background 0.2s;
}
.print-btn:hover{background:var(--blue-700)}

/* ============================================================
   印刷用チェックシート（画面では非表示・印刷時のみ表示）
   ============================================================ */
#print-area{display:none}
@media print{
  html,body{background:#fff !important}
  body{visibility:hidden}
  #print-area{display:block !important;visibility:visible;position:absolute;left:0;top:0;width:100%}
  #print-area *{visibility:visible}
  @page{size:A3 portrait;margin:8mm}
  .pl-page{font-family:var(--font-body);color:#000;page-break-after:always}
  .pl-page:last-child{page-break-after:auto}
  .pl-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
  .pl-htitle{font-size:24px;font-weight:800;letter-spacing:2px}
  .pl-meta{font-size:14px;font-weight:700;line-height:1.7;margin-top:4px}
  .pl-issue{font-size:13px;font-weight:600;white-space:nowrap}
  .pl-top{border:1px solid #333;border-radius:3px;padding:5px 8px;margin-bottom:8px}
  .pl-top-title{font-size:12px;font-weight:700;margin-bottom:3px}
  .pl-top-items{display:flex;flex-wrap:wrap;gap:6px;font-size:12px}
  .pl-top-item{border:1px solid #999;border-radius:3px;padding:2px 8px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pl-top-none{font-size:11px;color:#777}
  .pl-grid{display:grid;grid-template-columns:repeat(15,1fr);border-left:1.4px solid #222;border-top:1.4px solid #222}
  .pl-cell{border-right:1.4px solid #222;border-bottom:1.4px solid #222;height:12mm;padding:1px;display:flex;flex-direction:column;align-items:center;overflow:hidden}
  .pl-cell.fill{background:#b4d0ee;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pl-cell.empty{background:#fff}
  .pl-n{font-size:9px;font-weight:700;color:#555;line-height:1}
  .pl-p{font-size:9.5px;font-weight:700;text-align:center;line-height:1.15;word-break:break-all;margin-top:1px}
  /* 品番別 合計数 */
  .pl-sum{margin-top:10px;border-top:2px solid #222;padding-top:6px}
  .pl-sum-title{font-size:14px;font-weight:800;margin-bottom:5px}
  .pl-sum-cols{column-count:3;column-gap:16px}
  .pl-sum-row{display:flex;justify-content:space-between;align-items:baseline;border-bottom:0.5px dotted #999;padding:1.5px 4px;font-size:11px;break-inside:avoid}
  .pl-sum-no{font-weight:600}
  .pl-sum-q{font-weight:800;white-space:nowrap;margin-left:8px}
}

/* SETUP SCREEN (initial GAS URL config) */
.setup-screen{
  position:fixed;inset:0;background:linear-gradient(135deg,var(--blue-50),#fff,var(--blue-100));
  display:flex;align-items:center;justify-content:center;z-index:1000;
}
.setup-card{
  background:var(--bg-card);border-radius:20px;padding:40px;text-align:center;
  box-shadow:var(--shadow-lg);border:1px solid var(--border);max-width:520px;width:92%;
}
.setup-card h2{font-size:22px;font-weight:900;color:var(--blue-700);margin-bottom:8px}
.setup-card p{color:var(--text2);font-size:13px;margin-bottom:20px;line-height:1.6}
.setup-card input{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px;color:var(--text);font-size:13px;font-family:var(--font-mono);margin-bottom:10px;
}
.setup-card input:focus{outline:none;border-color:var(--blue-400);box-shadow:0 0 0 3px var(--blue-100)}
.setup-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--blue-600),var(--blue-500));
  color:#fff;border:none;border-radius:var(--radius);padding:12px 32px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font-body);
  box-shadow:0 4px 14px rgba(37,99,235,0.35);transition:all 0.2s;
}
.setup-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,99,235,0.45)}
.setup-result{margin-top:12px;font-size:12px;min-height:20px}
.setup-hint{font-size:10px;color:var(--text3);margin-top:8px;line-height:1.5}

/* Loading overlay */
.loading-overlay{
  position:fixed;inset:0;background:rgba(255,255,255,0.9);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;gap:12px;
}
.spinner{width:40px;height:40px;border:4px solid var(--blue-100);border-top-color:var(--blue-500);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--text2);font-weight:600}

/* No data state */
.nodata{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:12px;color:var(--text2);
}
.nodata-icon{font-size:48px}
.nodata-text{font-size:16px;font-weight:700}
.nodata-sub{font-size:12px;color:var(--text3);text-align:center;line-height:1.6}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(30,58,95,0.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal-box{background:var(--bg-card);border-radius:var(--radius);padding:28px;width:520px;max-width:92vw;box-shadow:var(--shadow-lg);border:1px solid var(--border);max-height:90vh;overflow-y:auto}
.modal-box h3{font-size:17px;font-weight:800;color:var(--blue-700);margin-bottom:8px}
.modal-box .desc{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.modal-box input[type=text]{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--font-mono);margin-bottom:6px;
}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.mbtn{padding:8px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:13px;transition:all 0.15s}
.mbtn-save{background:var(--blue-600);color:#fff}
.mbtn-save:hover{background:var(--blue-700)}
.mbtn-cancel{background:var(--bg);color:var(--text2);border:1px solid var(--border) !important}

/* CSV upload area in modal */
.csv-drop{
  border:2px dashed var(--border);border-radius:var(--radius-sm);padding:20px;text-align:center;
  color:var(--text3);font-size:13px;cursor:pointer;transition:all 0.2s;margin-bottom:12px;
}
.csv-drop.over{border-color:var(--blue-400);background:var(--blue-50);color:var(--blue-600)}
.csv-drop input{display:none}
.csv-status{font-size:12px;margin-top:8px;min-height:18px}

/* POLL */
.poll-ind{
  position:fixed;bottom:6px;right:10px;font-size:9px;color:var(--text3);
  font-family:var(--font-mono);background:rgba(255,255,255,0.9);padding:2px 8px;
  border-radius:10px;border:1px solid var(--border-light);z-index:50;
}
.pdot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px;vertical-align:middle}
.pdot.on{background:var(--done);animation:pulse 1.5s infinite}
.pdot.off{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

<body>
<div id="app"></div>
<script>
// ============================================================
// CSV PARSING
// ============================================================
function parseCSVText(text){
  const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(lines.length<2)return null;
  const items=[];
  for(let i=1;i<lines.length;i++){
    const line=lines[i].replace(/"/g,'').trim();
    if(!line)continue;
    const hi=line.indexOf('#');
    if(hi<0)continue;
    const before=line.substring(0,hi),after=line.substring(hi+1);
    const pp=before.split(','),ap=after.split(',');
    const date=ap[0]||'',ci=(ap[1]||'').trim();
    let cart,slot,type;
    if(ci.includes('-')){const s=ci.split('-');cart=s[0];slot=parseInt(s[1]);type=1}
    else{cart=ci;slot=-1;type=2}
    items.push({product:pp[0]||'',num:pp[1]||'',date,cart,slot,type,full:line});
  }
  return items;
}

// Parse CSV rows from GAS (array of arrays, each row is [labelQR])
function parseCSVFromGAS(rows){
  const items=[];
  rows.forEach(row=>{
    const line=String(row[0]||'').replace(/"/g,'').trim();
    if(!line)return;
    if(line.indexOf('ラベル')>=0&&line.indexOf('#')<0)return;
    const hi=line.indexOf('#');
    if(hi<0)return;
    const before=line.substring(0,hi),after=line.substring(hi+1);
    const pp=before.split(','),ap=after.split(',');
    const date=ap[0]||'',ci=(ap[1]||'').trim();
    let cart,slot,type;
    if(ci.includes('-')){const s=ci.split('-');cart=s[0];slot=parseInt(s[1]);type=1}
    else{cart=ci;slot=-1;type=2}
    items.push({product:pp[0]||'',num:pp[1]||'',date,cart,slot,type,full:line});
  });
  return items.length>0?items:null;
}

// 全アイテムから梱包日一覧を新しい順で取得
function collectPackDates(items){
  const set={};
  items.forEach(it=>{if(it.date)set[it.date]=true});
  return Object.keys(set).sort((a,b)=>b.localeCompare(a));
}

// 指定梱包日のみを対象に台車データ構築
function buildCartData(items,packDate){
  const filtered=packDate?items.filter(it=>it.date===packDate):items;
  const carts={};let date=packDate||'';
  filtered.forEach(it=>{
    if(!date&&it.date)date=it.date;
    if(!carts[it.cart])carts[it.cart]={slots:{},type2:[],maxSlot:0};
    if(it.type===1){carts[it.cart].slots[it.slot]={product:it.product,num:it.num,full:it.full};if(it.slot>carts[it.cart].maxSlot)carts[it.cart].maxSlot=it.slot}
    else carts[it.cart].type2.push({product:it.product,num:it.num,full:it.full});
  });
  return{carts,date,totalItems:filtered.length};
}

// ============================================================
// STATE
// ============================================================
const S={
  // CSV管理
  allItems:null,         // 全梱包日の全アイテム
  packDates:[],          // 梱包日一覧(新しい順)
  currentPackDate:'',    // 選択中の梱包日
  cartData:null,         // 現在梱包日の台車データ
  selectedCart:null,
  // 検証済み（梱包日→cartId→Set）
  verifiedByDate:{},
  verified:{},           // 現在梱包日の検証データ（verifiedByDate[currentPackDate]）
  gasUrl:'',pollTimer:null,lastPoll:null,gasError:null,gasRows:0,
  phase:'init', // 'init' | 'setup' | 'loading' | 'nodata' | 'dashboard'
  showCsvModal:false,showSettingsModal:false,
  mobileView:'cart',autoFollow:true,
  lastVerifiedCart:null,lastVerifiedLabel:null,lastVerifiedSlot:null,lastVerifiedTime:null,lastVerifiedPackDate:null,lastVerifiedKey:null,
  csvUploading:false,
};
try{S.gasUrl=localStorage.getItem('subako_gas_url')||''}catch(e){}

// ============================================================
// GAS COMMUNICATION
// ============================================================
async function gasFetch(type){
  if(!S.gasUrl)return null;
  const sep=S.gasUrl.includes('?')?'&':'?';
  const url=S.gasUrl+sep+'type='+type+'&t='+Date.now();
  const r=await fetch(url,{redirect:'follow'});
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

async function gasPost(body){
  if(!S.gasUrl)throw new Error('GAS URL未設定');
  const r=await fetch(S.gasUrl,{
    method:'POST',redirect:'follow',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify(body)
  });
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

// Load both CSV + verify data
async function loadAll(){
  try{
    const data=await gasFetch('both');
    // CSV data
    if(data.csv&&data.csv.status==='ok'&&data.csv.data&&data.csv.data.length>0){
      let rows=data.csv.data;
      if(rows[0]&&String(rows[0][0]).includes('ラベル'))rows=rows.slice(1);
      const allItems=parseCSVFromGAS(rows);
      if(allItems){
        S.allItems=allItems;
        S.packDates=(data.csv.packDates&&data.csv.packDates.length)?data.csv.packDates:collectPackDates(allItems);
        // 初回は最小梱包日（最古）を選択 → 要件的に「作業中」を想定→実際の自動追従で切替
        // デフォルトは最新（先頭）。自動追従が働けば適切なものに切り替わる
        if(!S.currentPackDate||S.packDates.indexOf(S.currentPackDate)<0){
          S.currentPackDate=S.packDates[0]||'';
        }
        S.cartData=buildCartData(allItems,S.currentPackDate);
      }
    }
    // Verify data
    if(data.verify){
      parseVerifyRows(data.verify);
    }
    S.gasError=null;
    S.lastPoll=new Date();
    if(S.cartData){
      S.phase='dashboard';
    }else{
      S.phase='nodata';
    }
  }catch(e){
    console.warn('loadAll error:',e);
    S.gasError=e.message;
    if(!S.cartData)S.phase='nodata';
  }
  render();
}

// 梱包日を切り替える
function switchPackDate(pd){
  if(!pd||pd===S.currentPackDate)return;
  if(S.packDates.indexOf(pd)<0)return;
  S.currentPackDate=pd;
  S.cartData=buildCartData(S.allItems||[],pd);
  S.verified=S.verifiedByDate[pd]||{};
  S.selectedCart=null; // 新しい梱包日では選択リセット
}

// Poll verify data only (every 5s)
async function pollVerify(){
  if(!S.gasUrl||!S.cartData)return;
  try{
    const data=await gasFetch('verify');
    if(Array.isArray(data)){
      parseVerifyRows(data);
      S.lastPoll=new Date();S.gasError=null;
      S.gasRows=data.length;
    }
    render();
  }catch(e){
    S.gasError=e.message;render();
  }
}

function parseVerifyRows(rows){
  const vByDate={};
  let lastCart=null,lastLabel=null,lastSlot=null,lastTime=null,lastPackDate=null,lastKey=null;
  rows.forEach(row=>{
    let cartId=null,slotNum=null,productLabel=null,rowTime=null,packDate='';
    if(Array.isArray(row)){
      rowTime=row[0]?String(row[0]):'';
      const label=String(row[3]||'').trim();
      productLabel=label;
      // 梱包日抽出
      const pdm=label.match(/#(\d{8})/);
      if(pdm)packDate=pdm[1];
      let m=label.match(/#\d{8},(\d+_\d+)(?:-(\d+))?/);
      if(m){cartId=m[1];slotNum=m[2]?parseInt(m[2]):null}
      if(!cartId){
        const rawCart=String(row[4]||'').trim();
        const rawSlot=String(row[5]||'').trim();
        const cm=rawCart.match(/(\d+_\d+)/);
        if(cm)cartId=cm[1];
        if(cartId){const rs=parseInt(rawSlot);if(!isNaN(rs)&&rs>0)slotNum=rs}
      }
      if(!cartId){
        const colB=String(row[1]||'').trim();
        const colC=String(row[2]||'').trim();
        const bm=colB.match(/(\d+_\d+)/);
        if(bm)cartId=bm[1];
        else{const am=String(row[3]||'').match(/(\d+_\d+)(?:-(\d+))?/);if(am){cartId=am[1];slotNum=am[2]?parseInt(am[2]):null}}
        if(cartId&&!slotNum){const cs=parseInt(colC);if(!isNaN(cs)&&cs>0)slotNum=cs}
      }
    }else if(typeof row==='object'){
      const label=row['製品ラベル']||row.label||row.qr||'';
      productLabel=String(label);
      const pdm=String(label).match(/#(\d{8})/);
      if(pdm)packDate=pdm[1];
      let m=String(label).match(/#\d{8},(\d+_\d+)(?:-(\d+))?/);
      if(m){cartId=m[1];slotNum=m[2]?parseInt(m[2]):null}
    }
    if(cartId){
      const pd=packDate||'';
      if(!vByDate[pd])vByDate[pd]={};
      if(!vByDate[pd][cartId])vByDate[pd][cartId]=new Set();
      let thisKey;
      if(slotNum!==null&&!isNaN(slotNum)&&slotNum>0){vByDate[pd][cartId].add(slotNum);thisKey=slotNum}
      else{let idx=0;while(vByDate[pd][cartId].has('t2-'+idx))idx++;vByDate[pd][cartId].add('t2-'+idx);thisKey='t2-'+idx}
      lastCart=cartId;lastSlot=slotNum;lastLabel=productLabel;lastTime=rowTime;lastPackDate=pd;lastKey=thisKey;
    }
  });
  S.verifiedByDate=vByDate;
  S.verified=vByDate[S.currentPackDate]||{};
  if(lastCart){
    S.lastVerifiedCart=lastCart;S.lastVerifiedSlot=lastSlot;S.lastVerifiedTime=fmtTime(lastTime);S.lastVerifiedPackDate=lastPackDate;S.lastVerifiedKey=lastKey;
    if(lastLabel){const hi=lastLabel.indexOf('#');S.lastVerifiedLabel=hi>0?lastLabel.substring(0,hi):lastLabel}
    // Auto-follow: 梱包日とcartを追従
    if(S.autoFollow){
      // 異なる梱包日なら切替
      if(lastPackDate&&lastPackDate!==S.currentPackDate&&S.packDates.indexOf(lastPackDate)>=0){
        console.log('[AutoFollow] switching packDate to',lastPackDate);
        switchPackDate(lastPackDate);
      }
      if(S.cartData&&S.cartData.carts[lastCart]){
        console.log('[AutoFollow] switching cart to',lastCart);
        S.selectedCart=lastCart;
      }
    }
  }
}

function startPoll(){
  if(S.pollTimer)clearInterval(S.pollTimer);
  if(S.gasUrl)S.pollTimer=setInterval(pollVerify,5000);
}

// ============================================================
// STATS
// ============================================================
function cartStats(cid){
  const c=S.cartData.carts[cid],skeys=Object.keys(c.slots);
  const t1=skeys.length,t2c=c.type2.length,total=t1+t2c;
  const vs=S.verified[cid]||new Set();
  let d1=0;skeys.forEach(s=>{if(vs.has(parseInt(s)))d1++});
  let d2=0;for(let i=0;i<t2c;i++){if(vs.has('t2-'+i))d2++}
  const done=d1+d2;
  return{t1,t2c,total,done,d1,d2,complete:done>=total&&total>0};
}
function allStats(){
  if(!S.cartData)return{tc:0,dc:0,ti:0,di:0};
  const ids=Object.keys(S.cartData.carts);
  let ti=0,di=0,dc=0;
  ids.forEach(id=>{const s=cartStats(id);ti+=s.total;di+=s.done;if(s.complete)dc++});
  return{tc:ids.length,dc,ti,di};
}
function sortC(ids){return ids.sort((a,b)=>{const[ar,ac]=a.split('_').map(Number);const[br,bc]=b.split('_').map(Number);return ar!==br?ar-br:ac-bc})}
function fmtD(d){if(!d||d.length!==8)return d;return d.slice(0,4)+'/'+d.slice(4,6)+'/'+d.slice(6,8)}
function fmtTime(t){if(!t)return'';const s=String(t).trim();if(s.includes('T')&&(s.endsWith('Z')||s.includes('+'))){try{const d=new Date(s);if(!isNaN(d))return d.toLocaleString('ja-JP',{timeZone:'Asia/Tokyo'})}catch(e){}}return s}

// ============================================================
// RENDER
// ============================================================
function render(){
  const app=document.getElementById('app');

  if(S.phase==='init'||S.phase==='setup'){
    app.innerHTML=setupHTML();setupHandlers();return;
  }
  if(S.phase==='loading'){
    app.innerHTML='<div class="loading-overlay"><div class="spinner"></div><div class="loading-text">データを読み込み中...</div></div>';
    return;
  }
  if(S.phase==='nodata'){
    app.innerHTML=nodataHTML();return;
  }

  // Dashboard
  const a=allStats(),pct=a.ti>0?(a.di/a.ti*100):0;
  const ids=sortC(Object.keys(S.cartData.carts));
  if(!S.selectedCart||!S.cartData.carts[S.selectedCart])S.selectedCart=ids[0];

  app.innerHTML=headerHTML(a)+packDateTabsHTML()+progressHTML(a,pct)+controlsHTML(ids)+
    '<div class="main-area">'+cartsDetailHTML(ids)+'</div>'+
    mobileNavHTML(ids)+
    (S.showSettingsModal?settingsModalHTML():'')+
    '<div class="poll-ind"><span class="pdot '+(S.gasUrl?'on':'off')+'"></span>'+(S.gasUrl?'自動更新':'')+(S.gasError?' <span style="color:#ef4444">⚠'+S.gasError+'</span>':'')+(S.gasRows?' ('+S.gasRows+'件)':'')+(S.lastPoll?' | '+S.lastPoll.toLocaleTimeString('ja-JP'):'')+'</div>';

  // 自動追従: 最後に照合された台車カードを画面内にスクロール
  if(S.autoFollow&&S.lastVerifiedCart&&(!S.lastVerifiedPackDate||S.lastVerifiedPackDate===S.currentPackDate)){
    setTimeout(()=>scrollToCard(S.lastVerifiedCart),60);
  }
}

function scrollToCard(cid){
  const el=document.getElementById('cart-card-'+cid);
  if(el)el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function packDateTabsHTML(){
  if(!S.packDates||S.packDates.length===0)return'';
  let html='<div class="packdate-tabs"><span class="packdate-tabs-label">📅 梱包日</span>';
  S.packDates.forEach(d=>{
    // 作業中判定: その梱包日に未完了の台車がある
    const filtered=(S.allItems||[]).filter(it=>it.date===d);
    const vbd=S.verifiedByDate[d]||{};
    let totalItems=filtered.length,doneItems=0;
    const cartMap={};
    filtered.forEach(it=>{if(!cartMap[it.cart])cartMap[it.cart]={};cartMap[it.cart][it.slot>0?it.slot:'t2-'+(Object.keys(cartMap[it.cart]).length)]=true});
    Object.keys(vbd).forEach(cid=>{const set=vbd[cid];set.forEach(()=>doneItems++)});
    // doneItemsは他梱包日のデータが混入する可能性を避けるため、実数より多く/少なく出る可能性あり
    // 単純にカウント
    const isWorking=d===S.currentPackDate;
    const isWorkingVsLabel=(S.lastVerifiedPackDate===d);
    let cls='pd-tab';
    if(d===S.currentPackDate)cls+=' active';
    if(isWorkingVsLabel&&d!==S.currentPackDate)cls+=' working';
    html+='<button class="'+cls+'" onclick="W.setPackDate(\''+d+'\')">'+fmtD(d)+' <span class="pd-count">('+totalItems+')</span></button>';
  });
  html+='</div>';
  return html;
}

function setupHTML(){
  return'<div class="setup-screen"><div class="setup-card">'+
    '<svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="margin-bottom:12px"><rect width="48" height="48" rx="12" fill="#dbeafe"/><path d="M8 34V18l16-8 16 8v16l-16 8-16-8z" stroke="#2563eb" stroke-width="2" fill="none"/><path d="M8 18l16 8 16-8M24 26v16" stroke="#2563eb" stroke-width="2"/></svg>'+
    '<h2>巣箱照合ダッシュボード</h2>'+
    '<p>GAS URLを設定して接続してください<br>以降はURLを開くだけで進捗を確認できます</p>'+
    '<input type="text" id="setup-url" placeholder="https://script.google.com/macros/s/.../exec" value="'+(S.gasUrl||'')+'">'+
    '<button class="setup-btn" onclick="W.connect()">接続</button>'+
    '<div class="setup-result" id="setup-result"></div>'+
    '<div class="setup-hint">※ GASのdoGetにtype=bothパラメータ対応が必要です</div>'+
    '</div></div>';
}

function nodataHTML(){
  return headerHTMLSimple()+
    '<div class="nodata">'+
    '<div class="nodata-icon">📦</div>'+
    '<div class="nodata-text">巣箱CSVデータがまだアップロードされていません</div>'+
    '<div class="nodata-sub">TOPページからCSVをアップロードしてください<br>アップロード後は全デバイスで自動的に表示されます</div>'+
    '<a class="setup-btn" href="index.html" style="margin-top:12px;text-decoration:none;display:inline-block">🏠 TOPページへ</a>'+
    '</div>'+(S.showSettingsModal?settingsModalHTML():'');
}

function headerHTMLSimple(){
  return'<div class="header"><div class="header-logo"><span class="header-title">巣箱照合</span></div>'+
    '<div class="header-chips"></div>'+
    '<div class="header-actions">'+
    '<a class="hdr-btn" href="index.html">🏠 TOP</a>'+
    '<button class="hdr-btn" onclick="W.showSettings()">⚙ 設定</button></div></div>';
}

function headerHTML(a){
  const d=S.currentPackDate||(S.cartData?S.cartData.date:''),now=new Date();
  const today=now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0');
  return'<div class="header"><div class="header-logo"><span class="header-title">巣箱照合</span></div>'+
    '<div class="header-chips">'+
    '<span class="chip">発行 <span class="cv">'+today+'</span></span>'+
    '<span class="chip">梱包 <span class="cv">'+fmtD(d)+'</span></span>'+
    '<span class="chip hl">台車 <span class="cv">'+a.dc+'/'+a.tc+'台</span></span>'+
    '<span class="chip hl">製品 <span class="cv">'+a.di+'/'+a.ti+'本</span></span></div>'+
    '<div class="header-actions">'+
    '<a class="hdr-btn" href="index.html">🏠 TOP</a>'+
    '<button class="hdr-btn" onclick="W.showSettings()">⚙ 設定</button></div></div>';
}

function progressHTML(a,pct){
  return'<div class="progress-section"><div class="progress-bar-outer">'+
    '<div class="progress-bar-fill" style="width:'+pct+'%"></div>'+
    '<div class="progress-text">'+pct.toFixed(1)+'%　製品照合の進捗</div></div>'+
    '<div class="progress-stats"><span>台車: '+a.dc+'/'+a.tc+' 完了</span><span>製品: '+a.di+'/'+a.ti+' 照合済み</span></div></div>';
}

function mobileTabsHTML(){
  return'<div class="view-tabs">'+
    '<div class="vtab '+(S.mobileView==='cart'?'active':'')+'" onclick="W.setV(\'cart\')">📦 台車</div>'+
    '<div class="vtab '+(S.mobileView==='all'?'active':'')+'" onclick="W.setV(\'all\')">📊 一覧</div>'+
    '<div class="vtab '+(S.autoFollow?'active':'')+'" onclick="W.toggleAuto()">🔄 '+(S.autoFollow?'ON':'OFF')+'</div>'+

// 全台車を詳細グリッドで左から横並び表示
function cartsDetailHTML(ids){
  const COLS=15;

  const showLatest=(!S.lastVerifiedPackDate||S.lastVerifiedPackDate===S.currentPackDate);
  return'<div class="carts-detail">'+ids.map(cid=>{
    const c=S.cartData.carts[cid],st=cartStats(cid),vs=S.verified[cid]||new Set();
    const isLatestCart=showLatest&&S.lastVerifiedCart===cid;
    // 必要な行数のみ描画（巣箱を無駄に大きくしない）
    const rows=Math.max(1,Math.ceil((c.maxSlot||0)/COLS));
    let grid='';
    for(let r=0;r<rows;r++){for(let col=0;col<COLS;col++){
      const sn=r*COLS+col+1,sd=c.slots[sn];
      if(sd){
        const dn=vs.has(sn);
        const latest=isLatestCart&&S.lastVerifiedKey===sn;
        grid+='<div class="lcell '+(dn?'done':'pending')+(latest?' latest':'')+'" onclick="W.tog(\''+cid+'\','+sn+')">'+sn+'<div class="tip">#'+sn+' '+sd.product+','+sd.num+'</div></div>';
      }else grid+='<div class="lcell empty"></div>';
    }}
    let t2='';
    if(c.type2.length>0){
      t2='<div class="type2-box"><div class="type2-title">▲ 台車上部（タイプ2: '+c.type2.length+'個）</div><div class="type2-items">'+
        c.type2.map((t,i)=>{const latest=isLatestCart&&S.lastVerifiedKey===('t2-'+i);return'<div class="t2-chip'+(vs.has('t2-'+i)?' done':'')+(latest?' latest':'')+'" onclick="W.tog(\''+cid+'\',\'t2-'+i+'\')">'+t.product+','+t.num+'</div>'}).join('')+'</div></div>';
    }
    let latestInfo='';
    if(isLatestCart&&S.lastVerifiedLabel){
      latestInfo='<div class="latest-product"><div><div class="lp-label">最新照合 QR情報</div><div class="lp-value">'+S.lastVerifiedLabel+'</div></div>'+(S.lastVerifiedSlot?'<div class="lp-slot">差込口 #'+S.lastVerifiedSlot+'</div>':'')+(S.lastVerifiedTime?'<div class="lp-time">'+S.lastVerifiedTime+'</div>':'')+'</div>';
    }
    const cp=st.total>0?(st.done/st.total*100).toFixed(0):0;
    let cls='cart-detail-card';
    if(st.complete)cls+=' cdc-done';
    if(isLatestCart)cls+=' cdc-active';
    return'<div class="'+cls+'" id="cart-card-'+cid+'">'+
      '<div class="cdc-head"><div class="cdc-id">'+cid+'</div><div class="cdc-meta">'+
      '<span class="current-badge '+(st.complete?'badge-done':'badge-active')+'">'+(st.complete?'✓ 完了':'⏳ 作業中')+'</span>'+
      '<span class="current-count">'+st.done+' / '+st.total+'（'+cp+'%）</span></div></div>'+
      latestInfo+t2+
      '<div class="cdc-grid-wrap"><div class="large-grid" style="grid-template-columns:repeat('+COLS+',1fr)">'+grid+'</div></div>'+
      '</div>';
  }).join('')+'</div>';
}

// ============================================================
// 印刷（梱包日ごとのチェックシート）
// ============================================================
function escapeP(s){
  return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
// 品番-L寸 の表示文字を組み立てる（例: 5K19373-L1981）
function prodLabel(sd){
  let p=(sd.product||'').trim(),n=(sd.num||'').trim();
  let s=(p&&n)?(p+'-'+n):(p||n||'');
  if(!s&&sd.full){const hi=sd.full.indexOf('#');s=(hi>0?sd.full.substring(0,hi):sd.full).replace(/,/g,'-').trim();}
  return s;
}
// 印刷用：品番を「-L」の前で強制改行（例: 5K19373- / L1981）。戻り値はエスケープ済みHTML。
function prodLabelHTML(sd){
  let p=(sd.product||'').trim(),n=(sd.num||'').trim();
  if(p&&n)return escapeP(p)+'-<br>'+escapeP(n);
  let s=prodLabel(sd);
  const idx=s.lastIndexOf('-L');
  if(idx>0)return escapeP(s.slice(0,idx+1))+'<br>'+escapeP(s.slice(idx+1));
  return escapeP(s);
}
// 現在の梱包日の全台車を印刷用HTMLに変換（巣箱の並び＝15列グリッド：番号＋品番-L寸）
function buildPrintHTML(){
  const pd=S.currentPackDate;
  const ids=sortC(Object.keys(S.cartData.carts));
  const now=new Date();
  const today=now.getFullYear()+'/'+String(now.getMonth()+1).padStart(2,'0')+'/'+String(now.getDate()).padStart(2,'0');
  const GC=15; // 巣箱の横並び数
  let html='';
  ids.forEach(cid=>{
    const c=S.cartData.carts[cid];
    const maxSlot=c.maxSlot||0;
    const total=Object.keys(c.slots).length+c.type2.length;
    // 巣箱グリッド（各マス：上=巣箱口番号 / 下=品番-L寸）
    const grows=Math.max(1,Math.ceil(maxSlot/GC));
    let cells='';
    for(let r=0;r<grows;r++){for(let col=0;col<GC;col++){
      const sn=r*GC+col+1;
      if(sn>maxSlot){cells+='<div class="pl-cell empty"></div>';continue;}
      const sd=c.slots[sn];
      const p=sd?prodLabelHTML(sd):'';
      cells+='<div class="pl-cell '+(sd?'fill':'empty')+'"><div class="pl-n">'+sn+'</div><div class="pl-p">'+p+'</div></div>';
    }}
    // 台車上部（タイプ2＝巣箱の上に乗せる分）
    const topItems=c.type2.length
      ? c.type2.map(t=>'<span class="pl-top-item">'+escapeP(prodLabel(t))+'</span>').join('')
      : '<span class="pl-top-none">（なし）</span>';
    // 品番別 合計数（巣箱内＋台車上部すべてを品番-L寸でグループ化）
    const counts={};
    Object.keys(c.slots).forEach(k=>{const key=prodLabel(c.slots[k]);if(key)counts[key]=(counts[key]||0)+1;});
    c.type2.forEach(t=>{const key=prodLabel(t);if(key)counts[key]=(counts[key]||0)+1;});
    const keys=Object.keys(counts).sort((a,b)=>a.localeCompare(b,'ja',{numeric:true}));
    const totalQty=keys.reduce((s,k)=>s+counts[k],0);
    const sumRows=keys.map(k=>'<div class="pl-sum-row"><span class="pl-sum-no">'+escapeP(k)+'</span><span class="pl-sum-q">'+counts[k]+'本</span></div>').join('');
    const sumHtml=keys.length
      ? '<div class="pl-sum"><div class="pl-sum-title">品番別 合計数（'+keys.length+'品番／計'+totalQty+'本）</div><div class="pl-sum-cols">'+sumRows+'</div></div>'
      : '';
    html+='<div class="pl-page">'+
      '<div class="pl-header"><div><div class="pl-htitle">巣箱リスト</div>'+
        '<div class="pl-meta">梱包日：'+fmtD(pd)+'　／　台車：'+escapeP(cid)+'　／　本数：'+total+'本</div></div>'+
        '<div class="pl-issue">発行日：'+today+'</div></div>'+
      '<div class="pl-top"><div class="pl-top-title">▲ 巣箱上に乗せる分（台車上部）</div><div class="pl-top-items">'+topItems+'</div></div>'+
      '<div class="pl-grid">'+cells+'</div>'+
      sumHtml+
      '</div>';
  });
  return html;
}
function printSubakoList(){
  if(!S.cartData||Object.keys(S.cartData.carts).length===0){alert('印刷対象の台車がありません');return;}
  let pa=document.getElementById('print-area');
  if(!pa){pa=document.createElement('div');pa.id='print-area';document.body.appendChild(pa);}
  pa.innerHTML=buildPrintHTML();
  window.print();
}

// EVENT HANDLERS

function setupHandlers(){
  // Setup screen connect button handled by W.connect
}

const W={
  async connect(){
    const el=document.getElementById('setup-result');
    const url=(document.getElementById('setup-url')||{}).value||'';
    if(!url.trim()){el.innerHTML='<span style="color:#ef4444">URLを入力してください</span>';return}
    el.innerHTML='<span style="color:var(--blue-500)">接続テスト中...</span>';
    S.gasUrl=url.trim();
    try{localStorage.setItem('subako_gas_url',S.gasUrl)}catch(e){}
    try{
      const data=await gasFetch('both');
      if(!data){el.innerHTML='<span style="color:#ef4444">レスポンスが空です</span>';return}
      el.innerHTML='<span style="color:var(--done)">✓ 接続成功！</span>';
      S.phase='loading';render();
      await loadAll();
      startPoll();
    }catch(e){
      el.innerHTML='<span style="color:#ef4444">接続失敗: '+e.message+'</span>';
    }
  },
  sel(cid){S.selectedCart=cid;render();scrollToCard(cid)},
  setPackDate(pd){
    switchPackDate(pd);
    render();
  },
  tog(cid,sk){
    if(!S.verifiedByDate[S.currentPackDate])S.verifiedByDate[S.currentPackDate]={};
    if(!S.verifiedByDate[S.currentPackDate][cid])S.verifiedByDate[S.currentPackDate][cid]=new Set();
    const k=typeof sk==='string'?sk:parseInt(sk);
    const bucket=S.verifiedByDate[S.currentPackDate][cid];
    if(bucket.has(k)){bucket.delete(k);}
    else{
      bucket.add(k);
      // 手動チェックも最終照合ハイライト対象にする
      S.lastVerifiedCart=cid;S.lastVerifiedKey=k;S.lastVerifiedPackDate=S.currentPackDate;
      S.lastVerifiedSlot=(typeof k==='number')?k:null;
    }
    S.verified=S.verifiedByDate[S.currentPackDate];
    render();
  },
  toggleAuto(){S.autoFollow=!S.autoFollow;render()},
  showSettings(){S.showSettingsModal=true;render()},
  closeSettings(e){if(e.target.classList.contains('modal-bg')){S.showSettingsModal=false;render()}},
  async saveSettings(){
    const url=(document.getElementById('settings-url')||{}).value||'';
    S.gasUrl=url.trim();
    try{localStorage.setItem('subako_gas_url',S.gasUrl)}catch(e){}
    S.showSettingsModal=false;S.phase='loading';render();
    await loadAll();startPoll();
  },
  setV(v){S.mobileView=v;render()},
  printList(){printSubakoList()},
};
window.W=W;

function setupCsvDrop(){
  setTimeout(()=>{
    const drop=document.getElementById('csv-drop');
    const fileIn=document.getElementById('csv-file');
    if(!drop||!fileIn)return;
    ['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();drop.classList.add('over')}));
    ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();e.stopPropagation();drop.classList.remove('over')}));
    drop.addEventListener('drop',e=>{const f=e.dataTransfer.files;if(f.length>0)handleCSVFile(f[0])});
    fileIn.addEventListener('change',e=>{const f=e.target.files[0];if(f)handleCSVFile(f)});
  },100);
}

async function handleCSVFile(file){
  const statusEl=document.getElementById('csv-status');
  if(statusEl)statusEl.innerHTML='<span style="color:var(--blue-500)">読み込み中...</span>';
  const reader=new FileReader();
  reader.onload=async ev=>{
    const text=ev.target.result;
    const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());
    if(lines.length<2){
      if(statusEl)statusEl.innerHTML='<span style="color:#ef4444">CSVデータが空です</span>';
      return;
    }
    // Validate
    const items=parseCSVText(text);
    if(!items||items.length===0){
      if(statusEl)statusEl.innerHTML='<span style="color:#ef4444">CSVの形式が正しくありません</span>';
      return;
    }
    if(statusEl)statusEl.innerHTML='<span style="color:var(--blue-500)">スプレッドシートにアップロード中... ('+lines.length+'行)</span>';
    // Upload to GAS
    try{
      const rows=lines.map(l=>[l]);
      const result=await gasPost({action:'uploadCSV',rows:rows});
      if(result.status==='ok'){
        const added=result.added!==undefined?result.added:items.length;
        if(statusEl)statusEl.innerHTML='<span style="color:var(--done)">✓ 新規'+added+'件追加 / 合計'+result.count+'件保持</span>';
        // Reload fully to reflect merged state
        S.showCsvModal=false;
        await loadAll();
        startPoll();
      }else{
        if(statusEl)statusEl.innerHTML='<span style="color:#ef4444">エラー: '+(result.message||'不明')+'</span>';
      }
    }catch(e){
      if(statusEl)statusEl.innerHTML='<span style="color:#ef4444">アップロード失敗: '+e.message+'</span>';
    }
  };
  reader.readAsText(file,'Shift_JIS');
}

// ============================================================
// GLOBAL TOOLTIP
// ============================================================
const gtip=document.createElement('div');
gtip.id='gtip';
document.body.appendChild(gtip);
let tipTarget=null;
document.addEventListener('mouseover',function(e){
  const cell=e.target.closest('.lcell');
  if(!cell||!cell.querySelector('.tip')){gtip.style.display='none';tipTarget=null;return}
  tipTarget=cell;
  gtip.textContent=cell.querySelector('.tip').textContent;
  const rect=cell.getBoundingClientRect();
  gtip.style.display='block';
  const tipW=gtip.offsetWidth,tipH=gtip.offsetHeight;
  let left=rect.left+rect.width/2-tipW/2;
  if(left<4)left=4;
  if(left+tipW>window.innerWidth-4)left=window.innerWidth-tipW-4;
  gtip.style.left=left+'px';
  gtip.style.top=rect.top<100?(rect.bottom+6)+'px':(rect.top-tipH-6)+'px';
});
document.addEventListener('mouseout',function(e){
  const cell=e.target.closest('.lcell');
  if(cell&&e.relatedTarget&&cell.contains(e.relatedTarget))return;
  if(cell===tipTarget||!e.relatedTarget||!e.relatedTarget.closest||!e.relatedTarget.closest('.lcell')){
    gtip.style.display='none';tipTarget=null;
  }
});

// Hide tooltip on render
const _origRender=render;
function renderSafe(){gtip.style.display='none';tipTarget=null;_origRender()}
render=renderSafe;

  if(S.gasUrl){

    startPoll();
