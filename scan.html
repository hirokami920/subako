<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>巣箱照合アプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
    padding: 10px;
    font-size: 15px;
  }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { font-size: 17px; font-weight: 600; text-align: center; margin-bottom: 8px; }

  /* 作業エリア：狭い画面=縦1列／広い画面(タブレット)=左右2列で縦に収める */
  .work-area { display: flex; flex-direction: column; }
  .wa-left, .wa-right { min-width: 0; }
  @media (min-width: 760px) {
    .container { max-width: 1040px; }
    .work-area { flex-direction: row; gap: 16px; align-items: flex-start; }
    .wa-left { flex: 1.1 1 0; min-width: 0; }
    .wa-right { flex: 0.9 1 0; min-width: 0; }
    .scanner-area { max-height: 340px; }
  }

  /* 初期設定 */
  .setup-screen { background: #fff; border-radius: 12px; padding: 20px; margin-top: 20px; }
  .setup-screen h2 { font-size: 18px; margin-bottom: 12px; }
  .setup-screen p { font-size: 13px; color: #6e6e73; margin-bottom: 16px; line-height: 1.5; }
  .setup-screen input {
    width: 100%; padding: 10px; border: 1px solid #d0d0d0; border-radius: 8px;
    font-size: 13px; margin-bottom: 12px; font-family: ui-monospace, monospace;
  }
  .setup-screen label { font-size: 12px; color: #6e6e73; display: block; margin-bottom: 4px; }
  .setup-btn {
    width: 100%; padding: 12px; background: #007aff; color: #fff; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .setup-skip {
    width: 100%; padding: 10px; background: transparent; color: #6e6e73; border: none;
    font-size: 13px; cursor: pointer; margin-top: 8px; font-family: inherit;
  }

  /* カメラ */
  .scanner-area {
    background: #000; border-radius: 12px; overflow: hidden; position: relative;
    aspect-ratio: 4/3; margin-bottom: 8px; cursor: pointer;
  }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-guide {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 62%; height: 58%; border: 3px solid rgba(255,255,255,0.4);
    border-radius: 8px; pointer-events: none; transition: border-color 0.2s;
  }
  .scan-guide.detecting { border-color: rgba(0,255,0,1); background: rgba(0,255,0,0.08); }
  .scan-status {
    position: absolute; bottom: 6px; left: 6px; right: 6px;
    background: rgba(0,0,0,0.75); color: #fff; padding: 5px 8px;
    border-radius: 6px; font-size: 12px; text-align: center; font-weight: 500;
  }
  .scan-info {
    position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.7);
    color: #0f0; padding: 3px 6px; border-radius: 4px; font-size: 10px; font-family: monospace;
  }
  .scan-live {
    position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.7);
    color: #ffcc00; padding: 3px 6px; border-radius: 4px; font-size: 10px;
    font-family: monospace; max-width: 65%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* 梱包日タブ */
  .packdate-tabs {
    display: flex; gap: 6px; margin-bottom: 8px; overflow-x: auto;
    align-items: center; padding: 4px 0;
  }
  .packdate-tabs-label {
    font-size: 11px; color: #6e6e73; font-weight: 700; margin-right: 4px; flex-shrink: 0;
  }
  .pd-tab {
    background: #fff; border: 1px solid #d0d0d0; color: #6e6e73;
    border-radius: 16px; padding: 4px 12px; font-family: ui-monospace, monospace;
    font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
    flex-shrink: 0; transition: all 0.2s;
  }
  .pd-tab.active { background: #007aff; color: #fff; border-color: #007aff; }
  .pd-tab.current-scan { background: #ff9500; color: #fff; border-color: #ff9500; }

  /* 台車情報バー */
  .cart-bar {
    background: #1d1d1f; color: #fff; border-radius: 8px; padding: 8px 12px;
    margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
  }
  .cart-bar.empty { background: #8e8e93; }
  .cart-label { font-size: 13px; color: rgba(255,255,255,0.6); }
  .cart-value { font-size: 30px; font-weight: 800; font-family: ui-monospace, monospace; line-height: 1.1; }
  .cart-count { text-align: right; }
  .cart-count-num { font-size: 26px; font-weight: 800; }

  /* スロット */
  .slots { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .slot {
    background: #fff; border: 2px solid #e0e0e0; border-radius: 8px;
    padding: 8px 10px; min-height: 78px;
  }
  .slot.filled { border-color: #007aff; background: #f0f7ff; }
  .slot.target { border-color: #ff9500; background: #fff8f0; }
  .slot-label { font-size: 13px; color: #6e6e73; margin-bottom: 3px; font-weight: 700; }
  .slot-value { font-size: 22px; font-weight: 700; word-break: break-all; font-family: ui-monospace, monospace; min-height: 26px; line-height: 1.25; }
  /* 差込口QR は数字のみなので特に大きく */
  #value1 { font-size: 38px; font-weight: 800; }
  .slot-extracted { font-size: 15px; color: #007aff; margin-top: 3px; font-weight: 700; }

  /* 読取スライダー 30% */
  .capture-slider {
    background: #fff; border: 2px solid #007aff; border-radius: 50px;
    height: 48px; position: relative; overflow: hidden; user-select: none;
    touch-action: pan-y; margin-bottom: 8px;
    width: 30%; margin-left: auto; margin-right: 0;
  }
  .capture-track {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: #007aff; font-weight: 600; font-size: 12px; pointer-events: none;
  }
  .capture-fill {
    position: absolute; top: 0; left: 0; bottom: 0; width: 44px;
    background: #007aff; border-radius: 50px; transition: width 0.2s ease-out;
  }
  .capture-thumb {
    position: absolute; top: 3px; left: 3px; width: 40px; height: 40px;
    background: #007aff; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 16px; transition: transform 0.2s ease-out; cursor: grab;
  }
  .capture-thumb:active { cursor: grabbing; }
  .capture-slider.disabled { opacity: 0.4; pointer-events: none; border-color: #b0b0b0; }
  .capture-slider.disabled .capture-fill,
  .capture-slider.disabled .capture-thumb { background: #b0b0b0; }
  .capture-slider.disabled .capture-track { color: #6e6e73; }

  /* 入力モード切替バー */
  .mode-bar { display: flex; gap: 8px; margin-bottom: 8px; }
  .mode-btn {
    flex: 1; padding: 12px; border: 2px solid #d0d0d0; border-radius: 10px;
    background: #fff; color: #6e6e73; font-size: 16px; font-weight: 700;
    font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .mode-btn.active { border-color: #007aff; color: #007aff; background: #eef6ff; }

  /* スキャナー待機パネル */
  .scanner-wait {
    display: none; background: #0b2136; color: #fff; border-radius: 12px;
    padding: 26px 16px; text-align: center; margin-bottom: 8px;
  }
  .scanner-wait .sw-icon { font-size: 46px; line-height: 1; }
  .scanner-wait .sw-title { font-size: 21px; font-weight: 800; margin-top: 8px; }
  .scanner-wait .sw-sub { font-size: 15px; color: #bcd2e8; margin-top: 8px; font-weight: 600; }
  .scanner-wait .sw-hint { font-size: 11px; color: #6e8aa6; margin-top: 12px; }

  /* モード別の表示切替 */
  #main-app.mode-scanner #scanner-area,
  #main-app.mode-scanner #capture-btn { display: none; }
  #main-app.mode-scanner #scanner-wait { display: block; }
  #main-app.mode-camera #scanner-wait { display: none; }

  /* 読取ボタン（ワンタップ・片手操作） */
  .capture-btn {
    width: 100%; height: 64px; border: none; border-radius: 14px;
    background: #007aff; color: #fff; font-size: 22px; font-weight: 800;
    font-family: inherit; cursor: pointer; margin-bottom: 8px;
    box-shadow: 0 3px 10px rgba(0,122,255,0.35);
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .capture-btn:active { background: #005fcc; transform: scale(0.99); }
  .capture-btn.disabled { opacity: 0.45; pointer-events: none; }

  /* 結果 */
  .result-banner {
    padding: 18px; border-radius: 12px; text-align: center;
    margin-bottom: 8px; font-size: 34px; font-weight: 800; display: none;
  }
  .result-banner.ok { background: #d4edda; color: #155724; display: block; animation: okBlink 0.4s ease-out 3; }
  .result-banner.ng { background: #f8d7da; color: #721c24; display: block; animation: ngBlink 0.4s ease-out 4; }
  @keyframes okBlink {
    0%, 100% { background: #d4edda; color: #155724; transform: scale(1); }
    50% { background: #28a745; color: #fff; transform: scale(1.05); }
  }
  @keyframes ngBlink {
    0%, 100% { background: #f8d7da; color: #721c24; transform: translateX(0); }
    25% { transform: translateX(-12px); }
    50% { background: #dc3545; color: #fff; transform: scale(1.07); }
    75% { transform: translateX(12px); }
  }
  .result-detail { font-size: 16px; font-weight: 500; margin-top: 5px; }

  /* 全画面フラッシュ（OK=緑 / NG=赤）— 工場内で遠くからでも判別 */
  .flash { position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0; }
  .flash.ok { animation: flashOK 0.45s ease-out 2; }
  .flash.ng { animation: flashNG 0.4s ease-out 3; }
  @keyframes flashOK {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; background: rgba(40,167,69,0.18); box-shadow: inset 0 0 0 16px #28a745; }
  }
  @keyframes flashNG {
    0%, 100% { opacity: 0; }
    50% { opacity: 1; background: rgba(220,53,69,0.24); box-shadow: inset 0 0 0 18px #dc3545; }
  }

  .btn {
    padding: 10px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; width: 100%;
  }
  .btn-clear { background: #e0e0e0; color: #1d1d1f; margin-bottom: 8px; }

  /* 統計 */
  .stats {
    background: #fff; border-radius: 8px; padding: 6px;
    margin-bottom: 8px; display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 4px; text-align: center;
  }
  .stat-label { font-size: 9px; color: #6e6e73; }
  .stat-value { font-size: 16px; font-weight: 700; }
  .stat-ok { color: #28a745; }
  .stat-ng { color: #dc3545; }
  .stat-sync { color: #007aff; font-size: 12px; }

  /* 履歴 */
  .history {
    background: #fff; border-radius: 8px; max-height: 120px; overflow-y: auto; margin-bottom: 8px;
  }
  .history-item {
    padding: 5px 8px; border-bottom: 1px solid #f0f0f0; font-size: 10px;
    display: flex; justify-content: space-between; gap: 4px; align-items: center;
  }
  .history-item:last-child { border-bottom: none; }
  .history-tag { padding: 1px 6px; border-radius: 3px; font-weight: 600; font-size: 9px; flex-shrink: 0; }
  .history-tag.ok { background: #d4edda; color: #155724; }
  .history-tag.ng { background: #f8d7da; color: #721c24; }
  .history-sync { font-size: 9px; flex-shrink: 0; }
  .history-sync.synced { color: #28a745; }
  .history-sync.pending { color: #ff9500; }
  .history-sync.failed { color: #dc3545; }
  .history-values { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: ui-monospace, monospace; }

  /* 台車完了スライダー 50% */
  .cart-complete-slider {
    background: #fff; border: 2px solid #ff9500; border-radius: 50px;
    height: 48px; position: relative; overflow: hidden; user-select: none;
    touch-action: pan-y; margin-bottom: 6px;
    width: 50%; margin-left: auto; margin-right: 0;
  }
  .cart-complete-slider .slide-track-inner {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: #ff9500; font-weight: 600; font-size: 11px; pointer-events: none;
  }
  .cart-complete-slider .slide-fill-inner {
    position: absolute; top: 0; left: 0; bottom: 0; width: 44px;
    background: #ff9500; border-radius: 50px; transition: width 0.2s ease-out;
  }
  .cart-complete-slider .slide-thumb-inner {
    position: absolute; top: 3px; left: 3px; width: 40px; height: 40px;
    background: #ff9500; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 16px; transition: transform 0.2s ease-out; cursor: grab;
  }
  .cart-complete-slider.disabled { opacity: 0.4; pointer-events: none; border-color: #b0b0b0; }
  .cart-complete-slider.disabled .slide-fill-inner,
  .cart-complete-slider.disabled .slide-thumb-inner { background: #b0b0b0; }
  .cart-complete-slider.disabled .slide-track-inner { color: #6e6e73; }

  /* アプリ終了スライダー 50% */
  .slide-submit {
    background: #fff; border: 2px solid #dc3545; border-radius: 50px;
    height: 48px; position: relative; overflow: hidden; user-select: none;
    touch-action: pan-y; width: 50%; margin-left: auto; margin-right: 0;
  }
  .slide-submit .slide-track {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: #dc3545; font-weight: 600; font-size: 11px; pointer-events: none;
  }
  .slide-submit .slide-fill {
    position: absolute; top: 0; left: 0; bottom: 0; width: 44px;
    background: #dc3545; border-radius: 50px; transition: width 0.2s ease-out;
  }
  .slide-submit .slide-thumb {
    position: absolute; top: 3px; left: 3px; width: 40px; height: 40px;
    background: #dc3545; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 16px; transition: transform 0.2s ease-out;
  }
  .slide-submit.disabled { opacity: 0.4; pointer-events: none; border-color: #b0b0b0; }
  .slide-submit.disabled .slide-fill,
  .slide-submit.disabled .slide-thumb { background: #b0b0b0; }
  .slide-submit.disabled .slide-track { color: #6e6e73; }

  .hidden { display: none !important; }

  .end-screen { text-align: center; padding: 30px 20px; background: #fff; border-radius: 12px; }
  .end-screen h2 { font-size: 20px; margin-bottom: 10px; }
  .end-screen p { color: #6e6e73; margin-bottom: 16px; font-size: 13px; }
  .btn-download {
    background: #007aff; color: #fff; padding: 12px 20px; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin: 4px; font-family: inherit;
  }
  .btn-download.secondary { background: #8e8e93; }

  .phase-label {
    background: #007aff; color: #fff; padding: 4px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; text-align: center; margin-bottom: 6px;
  }
  .phase-label.cart { background: #1d1d1f; }
  .phase-label.slot { background: #ff9500; }
  .phase-label.label { background: #28a745; }
</style>
</head>
<body>

<!-- 全画面フラッシュ用オーバーレイ -->
<div id="flash" class="flash"></div>

<!-- 初期設定画面 -->
<div class="container" id="setup-app">
  <h1>巣箱照合アプリ</h1>
  <div class="setup-screen">
    <h2>Googleスプレッドシート連携</h2>
    <p>GASウェブアプリURLを入力。照合OKのデータがリアルタイムで記録されます。</p>
    <label>GAS ウェブアプリURL</label>
    <input type="text" id="gas-url" placeholder="https://script.google.com/macros/s/.../exec">
    <label>端末名（任意）</label>
    <input type="text" id="device-name" placeholder="例: タブレットA">
    <button class="setup-btn" onclick="saveSetup()">保存して開始</button>
    <button class="setup-skip" onclick="skipSetup()">連携なしで使用</button>
  </div>
</div>

<!-- メイン画面 -->
<div class="container hidden" id="main-app">
  <h1>巣箱照合アプリ</h1>

  <!-- 入力モード切替（既定=スキャナー） -->
  <div class="mode-bar">
    <button class="mode-btn" id="mode-scanner" onclick="setInputMode('scanner')">⌨ スキャナー</button>
    <button class="mode-btn" id="mode-camera" onclick="setInputMode('camera')">📷 カメラ</button>
  </div>

  <!-- 梱包日タブ -->
  <div class="packdate-tabs" id="pd-tabs" style="display:none">
    <span class="packdate-tabs-label">📅 梱包日</span>
  </div>

  <!-- 作業エリア（タブレット等の広い画面では左右2カラムにして縦に収める） -->
  <div class="work-area">
  <div class="wa-left">

  <!-- 台車情報 -->
  <div class="cart-bar empty" id="cart-bar">
    <div>
      <div class="cart-label">台車QR</div>
      <div class="cart-value" id="cart-value">未読取</div>
    </div>
    <div class="cart-count">
      <div class="cart-label">照合数</div>
      <div class="cart-count-num" id="cart-count">0</div>
    </div>
  </div>

  <!-- スキャナー待機パネル（スキャナーモード時に表示） -->
  <div class="scanner-wait" id="scanner-wait">
    <div class="sw-icon">⌨</div>
    <div class="sw-title">スキャナー読取モード</div>
    <div class="sw-sub" id="sw-sub">指リングでQRを読み取ってください</div>
    <div class="sw-hint">カメラで読みたい時は上の「📷 カメラ」をタップ</div>
  </div>

  <div class="scanner-area" id="scanner-area">
    <video id="video" playsinline autoplay muted></video>
    <div class="scan-guide" id="scan-guide"></div>
    <div class="scan-info" id="scan-info">起動中...</div>
    <div class="scan-live" id="scan-live"></div>
    <div class="scan-status" id="scan-status">カメラ起動中...</div>
  </div>

  <!-- 現在のフェーズ表示 -->
  <div class="phase-label cart" id="phase-label">①台車QRを読み取ってください</div>

  <button class="capture-btn" id="capture-btn">📷 読取（タップ）</button>

  <div class="slots">
    <div class="slot" id="slot1">
      <div class="slot-label">差込口QR</div>
      <div class="slot-value" id="value1"></div>
    </div>
    <div class="slot" id="slot2">
      <div class="slot-label">製品ラベル</div>
      <div class="slot-value" id="value2"></div>
      <div class="slot-extracted" id="extracted2"></div>
    </div>
  </div>

  <div class="result-banner" id="result"></div>

  </div><!-- /wa-left -->

  <div class="wa-right">

  <button class="btn btn-clear" onclick="clearSlots()">クリア（やり直し）</button>

  <div class="stats">
    <div>
      <div class="stat-label">合計</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div>
      <div class="stat-label">OK</div>
      <div class="stat-value stat-ok" id="stat-ok">0</div>
    </div>
    <div>
      <div class="stat-label">NG</div>
      <div class="stat-value stat-ng" id="stat-ng">0</div>
    </div>
    <div>
      <div class="stat-label">同期</div>
      <div class="stat-value stat-sync" id="stat-sync">-</div>
    </div>
  </div>

  <div class="history" id="history"></div>

  <!-- 台車完了スライダー -->
  <div class="cart-complete-slider disabled" id="cart-complete-slider">
    <div class="slide-fill-inner" id="cc-fill"></div>
    <div class="slide-thumb-inner" id="cc-thumb">→</div>
    <div class="slide-track-inner">台車完了</div>
  </div>

  <!-- アプリ終了スライダー -->
  <div class="slide-submit disabled" id="slide-submit">
    <div class="slide-fill" id="end-fill"></div>
    <div class="slide-thumb" id="end-thumb">→</div>
    <div class="slide-track">全作業終了</div>
  </div>

  </div><!-- /wa-right -->
  </div><!-- /work-area -->
</div>

<!-- 完了画面 -->
<div class="container hidden" id="end-app">
  <div class="end-screen">
    <h2>作業完了</h2>
    <p id="end-message"></p>
    <button class="btn-download" onclick="downloadCSV()">CSVダウンロード</button>
    <button class="btn-download secondary" onclick="location.reload()">最初からやり直す</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
// =========== 設定 ===========
let GAS_URL = '';
let DEVICE_NAME = '';

function loadSetup() {
  try {
    // TOPページと共通のGAS URL
    GAS_URL = localStorage.getItem('subako_gas_url') || '';
    DEVICE_NAME = localStorage.getItem('qr_device_name') || '';
  } catch(e) {}
}
function saveSetup() {
  const url = document.getElementById('gas-url').value.trim();
  const device = document.getElementById('device-name').value.trim();
  if (!url || !url.startsWith('https://script.google.com/')) {
    alert('正しいGAS URLを入力してください');
    return;
  }
  GAS_URL = url;
  DEVICE_NAME = device;
  try { localStorage.setItem('subako_gas_url', url); localStorage.setItem('qr_device_name', device); } catch(e) {}
  showMain();
}
function skipSetup() { GAS_URL = ''; DEVICE_NAME = ''; showMain(); }
function showMain() {
  document.getElementById('setup-app').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  warmupAudio(); // ボタン操作のうちにオーディオ/音声合成を起動

// 梱包日一覧を GAS から取得
async function loadPackDates() {
  if (!GAS_URL) return;
  try {
    const sep = GAS_URL.includes('?') ? '&' : '?';
    const r = await fetch(GAS_URL + sep + 'type=packdates&t=' + Date.now(), { redirect: 'follow' });
    if (!r.ok) return;
    const data = await r.json();
    if (data && data.packDates) {
      packDates = data.packDates;
      // デフォルト選択 = 最小梱包日（最古）
      if (!selectedPackDate || packDates.indexOf(selectedPackDate) < 0) {
        selectedPackDate = packDates.length > 0 ? packDates[packDates.length - 1] : '';
      }
      renderPackDateTabs();
    }
  } catch (e) {}
}

function fmtPackDate(d) {
  if (!d || d.length !== 8) return d;
  return d.slice(0, 4) + '/' + d.slice(4, 6) + '/' + d.slice(6, 8);
}

function renderPackDateTabs() {
  const tabs = document.getElementById('pd-tabs');
  if (!tabs) return;
  if (!packDates || packDates.length === 0) {
    tabs.style.display = 'none';
    return;
  }
  tabs.style.display = 'flex';
  let html = '<span class="packdate-tabs-label">📅 梱包日</span>';
  // 古い順（最小から）表示
  const sorted = packDates.slice().reverse();
  sorted.forEach(d => {
    let cls = 'pd-tab';
    if (d === selectedPackDate) cls += ' active';
    if (d === currentScanPackDate && d !== selectedPackDate) cls += ' current-scan';
    html += '<button class="' + cls + '" onclick="selectPackDate(\'' + d + '\')">' + fmtPackDate(d) + '</button>';
  });
  tabs.innerHTML = html;
}

function selectPackDate(d) {
  selectedPackDate = d;
  renderPackDateTabs();
}
window.selectPackDate = selectPackDate;

// ラベル文字列から梱包日抽出
function extractPackDateFromLabel(label) {
  if (!label) return '';
  const m = String(label).match(/#(\d{8})/);
  return m ? m[1] : '';
}

let currentTrack = null;

let syncedCount = 0, pendingCount = 0, failedCount = 0;
let totalCarts = 0;       // 完了台車数

let packDates = [];              // GASから取得した梱包日一覧（新しい順）
let currentScanPackDate = '';    // 現在読取中のラベル梱包日
let selectedPackDate = '';       // タブ選択中の梱包日（表示フィルタ用）

// =========== カメラ ===========
async function initDetector() {
  if ('BarcodeDetector' in window) {
    try {
      const supported = await BarcodeDetector.getSupportedFormats();
      if (supported.includes('qr_code')) {
        detector = new BarcodeDetector({ formats: ['qr_code'] });
        useNativeDetector = true;
        infoEl.textContent = 'Native';
        return true;
      }
    } catch (e) {}
  }
  if (typeof jsQR !== 'undefined') {
    useNativeDetector = false;
    canvas = document.createElement('canvas');
    ctx = canvas.getContext('2d', { willReadFrequently: true });
    infoEl.textContent = 'jsQR';
    return true;
  }
  infoEl.textContent = 'ERR';
  return false;
}

async function startCamera() {
  const ok = await initDetector();
  if (!ok) { statusEl.textContent = 'QR認識エンジン初期化失敗'; return; }

  const constraintsList = [
    // 高解像度ほど小さい/奥まったQRのモジュールが細かく写り、認識率が上がる
    { video: { facingMode: { exact: 'environment' }, width: { ideal: 2560 }, height: { ideal: 1440 }, frameRate: { ideal: 30 } } },
    { video: { facingMode: { exact: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } } },
    { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } } },
    { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
    { video: { facingMode: 'environment' } },
    { video: { facingMode: { ideal: 'environment' } } },
    { video: true }
  ];
  let stream = null, lastError = null;
  for (let i = 0; i < constraintsList.length; i++) {
    try {
      stream = await navigator.mediaDevices.getUserMedia(constraintsList[i]);
      break;
    } catch (e) { lastError = e; }
  }
  if (!stream) {
    const n = lastError ? lastError.name : 'Unknown';
    const m = lastError ? lastError.message : '';
    let h = '';
    if (n === 'NotAllowedError') h = '→ カメラ許可を確認';
    else if (n === 'NotReadableError') h = '→ 他アプリ終了してください';
    statusEl.textContent = '[' + n + '] ' + m + ' ' + h;
    return;
  }
  try {
    video.srcObject = stream;
    currentTrack = stream.getVideoTracks()[0];
    try {
      const cap = currentTrack.getCapabilities ? currentTrack.getCapabilities() : {};
      if (cap.focusMode && cap.focusMode.includes('continuous'))
        await currentTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
    } catch(e) {}
    await video.play();
    updatePhase();
    requestAnimationFrame(scanLoop);
  } catch (e) { statusEl.textContent = '映像再生エラー: ' + e.message; }
}

// ===== 読取精度向上のための設定・補助 =====
// 検出領域を毎フレーム切り替えて、斜め・中心外・小さい(奥まった)QRを広くカバー
//  0.4=狭め(小さいQRを拡大して精細に)  0.55=標準  0.72=広め(斜めで台形に広がるQR)
const CROP_RATIOS = [0.5, 0.65, 0.4, 0.8];
let scanFrame = 0;
const MAX_PROC = 1440; // jsQR処理画像の最大辺(px)。負荷上限。
let lastDetectData = null; // 直近に検出できたQR
let lastDetectTime = 0;    // その時刻(ms)

function ensureCropCanvas() {
  if (!cropCanvas) {
    cropCanvas = document.createElement('canvas');
    cropCtx = cropCanvas.getContext('2d', { willReadFrequently: true });
  }
}

// 複数QRが写った場合、クロップ中心に最も近いものを選ぶ(隣の差込口QRの誤読防止)
function pickCentralBarcode(barcodes, cw, ch) {
  if (barcodes.length === 1) return barcodes[0];
  const ccx = cw / 2, ccy = ch / 2;
  let best = barcodes[0], bestD = Infinity;
  for (const b of barcodes) {
    const bb = b.boundingBox || {};
    const bx = (bb.x != null) ? bb.x + (bb.width || 0) / 2 : ccx;
    const by = (bb.y != null) ? bb.y + (bb.height || 0) / 2 : ccy;
    const d = (bx - ccx) * (bx - ccx) + (by - ccy) * (by - ccy);
    if (d < bestD) { bestD = d; best = b; }
  }
  return best;
}

// jsQR向け：グレースケール化＋控えめなコントラスト強調(斜め/低コントラスト時の救済)
function enhanceForScan(d) {
  const k = 1.3, mid = 128; // コントラスト係数(控えめ)
  for (let i = 0; i < d.length; i += 4) {
    let y = d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114;
    y = (y - mid) * k + mid;
    y = y < 0 ? 0 : (y > 255 ? 255 : y);
    d[i] = d[i + 1] = d[i + 2] = y;
  }
}

async function scanLoop() {
  if (!scanning) { requestAnimationFrame(scanLoop); return; }
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    try {
      ensureCropCanvas();
      const vw = video.videoWidth, vh = video.videoHeight;
      const ratio = CROP_RATIOS[scanFrame % CROP_RATIOS.length];
      scanFrame++;
      const cw = Math.round(vw * ratio);
      const ch = Math.round(vh * ratio);
      const cx = Math.round((vw - cw) / 2);
      const cy = Math.round((vh - ch) / 2);
      let data = null;

      if (useNativeDetector) {
        // 端末標準のBarcodeDetectorは透視歪み(斜め)に強い。クロップ全解像度で検出
        cropCanvas.width = cw;
        cropCanvas.height = ch;
        cropCtx.drawImage(video, cx, cy, cw, ch, 0, 0, cw, ch);
        const barcodes = await detector.detect(cropCanvas);
        if (barcodes.length > 0) data = pickCentralBarcode(barcodes, cw, ch).rawValue;
      } else {
        // jsQR：処理解像度を上限内に収めつつ、小領域は拡大してモジュールを大きく見せる
        const longest = Math.max(cw, ch);
        let scale = MAX_PROC / longest;
        if (scale > 2) scale = 2;   // 拡大は最大2倍まで
        const dw = Math.max(1, Math.round(cw * scale));
        const dh = Math.max(1, Math.round(ch * scale));
        cropCanvas.width = dw;
        cropCanvas.height = dh;
        cropCtx.imageSmoothingEnabled = true;
        cropCtx.drawImage(video, cx, cy, cw, ch, 0, 0, dw, dh);
        const imageData = cropCtx.getImageData(0, 0, dw, dh);
        // まず素のまま(jsQR内蔵の二値化が有効なケースが多い)
        let code = jsQR(imageData.data, dw, dh, { inversionAttempts: 'attemptBoth' });
        if (!(code && code.data)) {
          // 失敗時のみコントラスト強調して再試行(成功時はチェックサムで保証されるため誤読しない)
          enhanceForScan(imageData.data);
          code = jsQR(imageData.data, dw, dh, { inversionAttempts: 'attemptBoth' });
        }
        if (code && code.data) data = code.data;
      }

      if (data) {
        liveCode = data;
        lastDetectData = data;
        lastDetectTime = Date.now();
        liveEl.textContent = '👁 ' + data;
        guideEl.classList.add('detecting');
      } else {
        liveCode = null;
        liveEl.textContent = '';
        guideEl.classList.remove('detecting');
      }
    } catch (e) {}
  }
  requestAnimationFrame(scanLoop);
}

// 画面タップでピント再調整（奥まった差込口QR対策）
document.getElementById('scanner-area').addEventListener('click', async () => {
  if (!currentTrack) return;
  try {
    const cap = currentTrack.getCapabilities ? currentTrack.getCapabilities() : {};
    const modes = (cap && cap.focusMode) || [];
    if (modes.includes('single-shot')) {
      await currentTrack.applyConstraints({ advanced: [{ focusMode: 'single-shot' }] });
      setTimeout(() => {
        if (modes.includes('continuous'))
          currentTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(() => {});
      }, 900);
    } else if (modes.includes('continuous')) {
      // single-shot非対応端末：一旦manualにしてから連続AFへ戻し、再合焦を促す
      if (modes.includes('manual')) {
        try { await currentTrack.applyConstraints({ advanced: [{ focusMode: 'manual' }] }); } catch (e) {}
      }
      currentTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] }).catch(() => {});
    }
  } catch (e) {}
});

// =========== フェーズ管理 ===========
function updatePhase() {
  if (phase === 'cart') {
    phaseEl.textContent = '①台車QRを読み取ってください';

    { const sw=document.getElementById('sw-sub'); if(sw)sw.textContent='③ 製品ラベルを読み取ってください'; }
    document.getElementById('slot1').classList.remove('target');
    document.getElementById('slot2').classList.add('target');
  }
}

// =========== ラベル解析 ===========
// 台車QR例: 20260403,3_3
// タイプ1ラベル例: 7K13257S,L=820.0#20260403,3_3-101
// タイプ2ラベル例: 5K19377S,L=415.0#20260403,3_3
// #以降を解析: 台車QR部分-差込口番号(タイプ1) or 台車QR部分のみ(タイプ2)
function parseLabel(raw) {
  // 空白を全て除去してから処理
  const cleaned = raw.replace(/\s/g, '');
  const hashIdx = cleaned.indexOf('#');
  if (hashIdx === -1) return null;
  const afterHash = cleaned.substring(hashIdx + 1); // "20260403,3_3-101" or "20260403,3_3"

  // 末尾から "-数字(1〜255)" のパターンを探す
  const match = afterHash.match(/^(.+)-(\d{1,3})$/);
  if (match) {
    const num = parseInt(match[2], 10);
    if (num >= 1 && num <= 255) {
      // タイプ1: 差込口番号あり
      return { type: 1, cartPart: match[1], slotNum: match[2], full: afterHash };
    }
  }
  // タイプ2: 差込口番号なし
  return { type: 2, cartPart: afterHash, slotNum: null, full: afterHash };
}

// =========== キャプチャ処理 ===========
// カメラ読取：現在検出中のQR（または直近1秒の検出）を共通処理へ渡す
function onCapture() {
  warmupAudio();
  let codeToUse = liveCode;
  if (!codeToUse && lastDetectData && (Date.now() - lastDetectTime) < 1000) {
    codeToUse = lastDetectData;
  }
  if (!codeToUse) {
    statusEl.textContent = '⚠ QR未認識：枠内いっぱいに大きく写し、画面をタップしてピント調整';
    beep(300, 200);
    return;
  }
  processScan(codeToUse);
}

// 読み取った文字列を現在フェーズに従って照合（カメラ／スキャナー共通）
function processScan(raw) {
  warmupAudio();
  const data = String(raw).replace(/\s/g, '');
  if (!data) return;

  if (phase === 'cart') {
    // 台車QR読取（空白除去済み）
    cartQR = data;
    cartMatchCount = 0;
    document.getElementById('cart-value').textContent = cartQR;
    document.getElementById('cart-bar').classList.remove('empty');
    document.getElementById('cart-count').textContent = '0';
    document.getElementById('cart-complete-slider').classList.remove('disabled');
    beep(1000, 150);
    phase = 'slot';
    clearSlotDisplay();
    updatePhase();
  } else if (phase === 'slot') {
    // 差込口QRか製品ラベルかを判定
    if (/^\d+$/.test(data)) {
      // 純数字 = 差込口QR (1〜255)
      const num = parseInt(data, 10);
      if (num < 1 || num > 255) {
        statusEl.textContent = '⚠ 差込口は1〜255: ' + data;
        beep(300, 300);
        return;
      }
      slotQR = data;
      document.getElementById('value1').textContent = data;
      document.getElementById('slot1').classList.add('filled');
      document.getElementById('slot1').classList.remove('target');
      beep(800, 100);
      phase = 'label';
      updatePhase();
    } else {
      // 製品ラベル → タイプ2チェック
      const parsed = parseLabel(data);
      if (!parsed) {
        statusEl.textContent = '⚠ ラベル形式不正(#なし): ' + data;
        beep(300, 300);
        return;
      }
      if (parsed.type === 1) {
        statusEl.textContent = '⚠ タイプ1ラベルです。先に差込口QRを読んでください';
        beep(300, 200);
        return;
      }
      // タイプ2: 台車QRのみ照合
      slotQR = null;
      labelRaw = data;
      document.getElementById('value2').textContent = truncate(data, 30);
      document.getElementById('extracted2').textContent = '台車: ' + parsed.cartPart;
      document.getElementById('slot2').classList.add('filled');

      // 梱包日を検出して追跡
      const pd2 = extractPackDateFromLabel(data);
      if (pd2) updateCurrentScanPackDate(pd2);

      const match = parsed.cartPart === cartQR;
      showResult(match, cartQR, parsed.cartPart, null, null, data);
    }
  } else if (phase === 'label') {
    // タイプ1: 製品ラベル読取
    const parsed = parseLabel(data);
    if (!parsed) {
      statusEl.textContent = '⚠ ラベル形式不正(#なし)';
      beep(300, 300);
      return;
    }
    labelRaw = data;
    document.getElementById('value2').textContent = truncate(data, 30);
    document.getElementById('extracted2').textContent = '台車:' + parsed.cartPart + ' 口:' + (parsed.slotNum || '-');
    document.getElementById('slot2').classList.add('filled');

    // 梱包日を検出して追跡
    const pd1 = extractPackDateFromLabel(data);
    if (pd1) updateCurrentScanPackDate(pd1);

    const cartMatch = parsed.cartPart === cartQR;
    const slotMatch = parsed.slotNum === slotQR;
    const ok = cartMatch && slotMatch;
    showResult(ok, cartQR, parsed.cartPart, slotQR, parsed.slotNum, data);
  }
}

// =========== 入力モード（スキャナー / カメラ） ===========
let inputMode = 'scanner';   // 既定はリングスキャナー読込
let cameraStarted = false;

function applyInputMode() {
  const app = document.getElementById('main-app');
  if (app) {
    app.classList.toggle('mode-scanner', inputMode === 'scanner');
    app.classList.toggle('mode-camera', inputMode === 'camera');
  }
  const bs = document.getElementById('mode-scanner');
  const bc = document.getElementById('mode-camera');
  if (bs) bs.classList.toggle('active', inputMode === 'scanner');
  if (bc) bc.classList.toggle('active', inputMode === 'camera');
  // カメラモードに切り替えたときだけカメラ起動（既定スキャナーなら起動しない＝権限要求なし）
  if (inputMode === 'camera' && !cameraStarted) {
    cameraStarted = true;
    startCamera();
  }
  updatePhase();
}
function setInputMode(m) {
  inputMode = m;
  warmupAudio();
  applyInputMode();
}
window.setInputMode = setInputMode;

// リングスキャナー（Bluetooth HID＝キーボード）入力をページ全体で受信
let scanBuf = '';
document.addEventListener('keydown', function(e) {
  if (inputMode !== 'scanner') return;
  const mainApp = document.getElementById('main-app');
  if (!mainApp || mainApp.classList.contains('hidden')) return; // 設定画面中は無視
  if (e.key === 'Enter') {
    const d = scanBuf.trim();
    scanBuf = '';
    if (d) { warmupAudio(); processScan(d); }
    e.preventDefault();
    return;
  }
  if (e.key && e.key.length === 1) {
    scanBuf += e.key;
    if (scanBuf.length > 300) scanBuf = ''; // 異常蓄積の保険
  }
});
// 画面タップで音声/効果音を起動（スキャナーモードでも一度は必要）
document.addEventListener('touchstart', warmupAudio, { passive: true });
document.addEventListener('click', warmupAudio);

// 現在読取中の梱包日を更新し、タブに反映
function updateCurrentScanPackDate(pd) {
  if (!pd) return;
  const changed = (pd !== currentScanPackDate);
  currentScanPackDate = pd;
  // 新しい梱包日が未登録なら追加
  if (packDates.indexOf(pd) < 0) {
    packDates.push(pd);
    packDates.sort((a, b) => b.localeCompare(a));
  }
  // 作業中梱包日と選択中が違う場合は自動追従（selectedPackDate を切替）
  if (changed) {
    selectedPackDate = pd;
    renderPackDateTabs();
  }
}

function showResult(ok, cartExpect, cartActual, slotExpect, slotActual, rawLabel) {
  let detail = '';
  let ngReason = '';

  // 重複チェック（差込口があるタイプ1のみ。台車上部=差込口なしは同一QRを個数分OKにする）
  if (ok && slotActual && isDuplicate(cartActual, slotActual)) {
    ok = false;
    ngReason = '重複';
    detail = '既に照合済みです: ' + cartActual + (slotActual ? '-' + slotActual : '');
  } else if (ok) {
    if (slotExpect !== null) {
      detail = `台車: ${cartExpect}=${cartActual}  口: ${slotExpect}=${slotActual||'-'}`;
    } else {
      detail = `台車: ${cartExpect}=${cartActual}`;
    }
  } else {
    // 照合不一致
    if (slotExpect !== null) {
      if (cartExpect !== cartActual) ngReason = '台車不一致';
      else if (slotExpect !== (slotActual||'')) ngReason = '差込口不一致';
      else ngReason = '不一致';
      detail = `台車: ${cartExpect}${cartExpect===cartActual ? '=':'≠'}${cartActual}  口: ${slotExpect}${slotExpect===(slotActual||'') ? '=':'≠'}${slotActual||'-'}`;
    } else {
      ngReason = '台車不一致';
      detail = `台車: ${cartExpect}≠${cartActual}`;
    }
  }

  resultEl.innerHTML = (ok ? '✓ OK' : '✗ NG') + (ngReason ? '（' + ngReason + '）' : '') + '<div class="result-detail">' + escapeHtml(detail) + '</div>';
  resultEl.className = 'result-banner ' + (ok ? 'ok' : 'ng');

  if (ok) {
    flashScreen('ok');
    playSuccess();
    statusEl.textContent = '✓ 照合OK → 自動記録';
    addToMatched(cartActual, slotActual);
    const record = {
      time: new Date().toLocaleString('ja-JP'),
      cart: cartQR,
      slot: slotExpect || '',
      label: rawLabel,
      cartExtracted: cartActual,
      slotExtracted: slotActual || '',
      result: 'OK',
      device: DEVICE_NAME,
      syncStatus: GAS_URL ? 'pending' : 'local'
    };
    records.push(record);
    cartMatchCount++;
    document.getElementById('cart-count').textContent = cartMatchCount;
    updateStats();
    addHistory(record);
    if (GAS_URL) { pendingCount++; updateStats(); sendToGAS(record, records.length - 1); }
    setTimeout(() => {
      clearSlotDisplay();
      phase = 'slot';
      updatePhase();
    }, 1200);
  } else {
    // 即時フィードバック：画面フラッシュ＋ブザー（音声より先に鳴らす）
    flashScreen('ng');
    playError();
    // NG音声メッセージ（短く・すぐ次の作業へ）
    const spMsg = 'エヌジーです。やり直してください。';
    statusEl.textContent = '✗ NG（' + ngReason + '）- 音声後に差込口QRから再読取します';
    const record = {
      time: new Date().toLocaleString('ja-JP'),
      cart: cartQR,
      slot: slotExpect || '',
      label: rawLabel,
      cartExtracted: cartActual,
      slotExtracted: slotActual || '',
      result: 'NG(' + ngReason + ')',
      device: DEVICE_NAME,
      syncStatus: 'local'
    };
    records.push(record);
    updateStats();
    addHistory(record);
    // 音声読み上げ → 終了後に差込口QR読込からやり直し（台車QRは保持）
    speakNG(spMsg, () => {
      if (!cartQR) return; // 念のため：台車未読取なら何もしない
      clearSlotDisplay();
      phase = 'slot';
      updatePhase();
      statusEl.textContent = '差込口QRから再読取してください';
    });
  }

  document.getElementById('slide-submit').classList.remove('disabled');
}

function clearSlots() {
  clearSlotDisplay();
  resultEl.className = 'result-banner';
  resultEl.innerHTML = '';
  if (cartQR) {
    phase = 'slot';
  } else {
    phase = 'cart';
  }
  updatePhase();
}

function clearSlotDisplay() {
  slotQR = null; labelRaw = null;
  document.getElementById('value1').textContent = '';
  document.getElementById('value2').textContent = '';
  document.getElementById('extracted2').textContent = '';
  document.getElementById('slot1').classList.remove('filled', 'target');
  document.getElementById('slot2').classList.remove('filled', 'target');
  resultEl.className = 'result-banner';
  resultEl.innerHTML = '';
}

function truncate(s, n) { return s.length > n ? s.substring(0, n) + '...' : s; }

// =========== 台車完了 ===========
function completeCart() {
  cartQR = null;
  cartMatchCount = 0;
  totalCarts++;
  document.getElementById('cart-value').textContent = '未読取';
  document.getElementById('cart-bar').classList.add('empty');
  document.getElementById('cart-count').textContent = '0';
  document.getElementById('cart-complete-slider').classList.add('disabled');
  clearSlotDisplay();
  phase = 'cart';
  updatePhase();
  beep(600, 100);
  setTimeout(() => beep(900, 100), 120);
  setTimeout(() => beep(1200, 150), 240);
  statusEl.textContent = '台車完了! (' + totalCarts + '台完了) → 次の台車へ';
}

// =========== GAS送信 ===========
async function sendToGAS(record, idx) {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        time: record.time,
        cart: record.cart,
        slot: record.slot,
        label: record.label,
        cartExtracted: record.cartExtracted,
        slotExtracted: record.slotExtracted,
        result: record.result,
        device: record.device
      })
    });
    records[idx].syncStatus = 'synced';
    pendingCount--; syncedCount++;
  } catch (e) {
    records[idx].syncStatus = 'failed';
    pendingCount--; failedCount++;
  }
  updateStats();
  updateHistoryItem(idx);
}

// =========== 統計・履歴 ===========
function updateStats() {
  document.getElementById('stat-total').textContent = records.length;
  document.getElementById('stat-ok').textContent = records.filter(r => r.result === 'OK').length;
  document.getElementById('stat-ng').textContent = records.filter(r => r.result === 'NG').length;
  if (GAS_URL) {
    const parts = [];
    if (syncedCount > 0) parts.push('✓' + syncedCount);
    if (pendingCount > 0) parts.push('…' + pendingCount);
    if (failedCount > 0) parts.push('✗' + failedCount);
    document.getElementById('stat-sync').textContent = parts.join(' ') || '-';
  } else {
    document.getElementById('stat-sync').textContent = 'OFF';
  }
}

function addHistory(record) {
  const hist = document.getElementById('history');
  const div = document.createElement('div');
  div.className = 'history-item';
  div.dataset.idx = records.length - 1;
  div.innerHTML = renderHistoryItem(record);
  hist.insertBefore(div, hist.firstChild);
}

function updateHistoryItem(idx) {
  const items = document.querySelectorAll('.history-item');
  for (const it of items) {
    if (parseInt(it.dataset.idx, 10) === idx) { it.innerHTML = renderHistoryItem(records[idx]); break; }
  }
}

function renderHistoryItem(r) {
  let syncHtml = '';
  if (r.syncStatus === 'synced') syncHtml = '<span class="history-sync synced">☁✓</span>';
  else if (r.syncStatus === 'pending') syncHtml = '<span class="history-sync pending">☁…</span>';
  else if (r.syncStatus === 'failed') syncHtml = '<span class="history-sync failed">☁✗</span>';
  const slotStr = r.slot ? '[' + r.slot + ']' : '';
  return `
    <span class="history-values">${escapeHtml(r.cart)}${slotStr} / ${escapeHtml(r.cartExtracted)}${r.slotExtracted ? '-' + escapeHtml(r.slotExtracted) : ''}</span>
    <span class="history-tag ${r.result === 'OK' ? 'ok' : 'ng'}">${r.result}</span>
    ${syncHtml}
  `;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// =========== 重複チェック用 ===========
let matchedSet = new Set(); // "台車QR|差込口" の組み合わせを保持

function isDuplicate(cartPart, slotNum) {
  const key = cartPart + '|' + (slotNum || '');
  return matchedSet.has(key);
}

function addToMatched(cartPart, slotNum) {
  const key = cartPart + '|' + (slotNum || '');
  matchedSet.add(key);
}

// =========== 音声・効果音（工場向け大音量・即時再生） ===========
// 単一のAudioContextを使い回す（毎回生成すると遅延・iOSで無音になるため）
let audioCtx = null;
function getAudioCtx() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) {}
  return audioCtx;
}

// ユーザー操作時にオーディオと音声合成を起こしておく（初回遅延の解消）
function warmupAudio() {
  getAudioCtx();
  // 音声合成エンジンを無音で一度起動しておくと、本番の発話が即座に始まる
  try {
    if ('speechSynthesis' in window && !speechWarmed) {
      const w = new SpeechSynthesisUtterance(' ');
      w.volume = 0; w.lang = 'ja-JP';
      speechSynthesis.speak(w);
      speechWarmed = true;
    }
  } catch (e) {}
}

// 連続トーン再生（コンプレッサ経由でクリップを抑えつつ最大音量）
function toneSeq(notes, type, masterVol) {
  const c = getAudioCtx();
  if (!c) return;
  try {
    const comp = c.createDynamicsCompressor();
    const master = c.createGain();
    master.gain.value = masterVol == null ? 1.0 : masterVol;
    comp.connect(master); master.connect(c.destination);
    const t0 = c.currentTime + 0.001;
    notes.forEach(n => {
      const o = c.createOscillator();
      const g = c.createGain();
      o.type = type || 'square';
      o.frequency.value = n.f;
      const st = t0 + n.t, en = st + n.d;
      g.gain.setValueAtTime(0.0001, st);
      g.gain.exponentialRampToValueAtTime(n.g || 0.95, st + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, en);
      o.connect(g); g.connect(comp);
      o.start(st); o.stop(en + 0.03);
    });
  } catch (e) {}
}

// 汎用ビープ（台車読取・差込口読取などの操作音）大音量
function beep(freq, duration) {
  toneSeq([{ f: freq, t: 0, d: (duration || 150) / 1000, g: 0.95 }], 'square', 1.0);
}

// 成功音：心地よい上昇アルペジオ（C5-E5-G5-C6）
function playSuccess() {
  toneSeq([
    { f: 523.25, t: 0.00, d: 0.13, g: 0.9 },
    { f: 659.25, t: 0.10, d: 0.13, g: 0.9 },
    { f: 783.99, t: 0.20, d: 0.13, g: 0.9 },
    { f: 1046.5, t: 0.30, d: 0.34, g: 1.0 }
  ], 'triangle', 1.0);
}
// 旧名互換
function playPinpon() { playSuccess(); }

// エラー音：即時の強い低音ブザー2連（工場内でも気付く）
function playError() {
  toneSeq([
    { f: 220, t: 0.00, d: 0.20, g: 1.0 },
    { f: 165, t: 0.22, d: 0.34, g: 1.0 }
  ], 'square', 1.0);
}

// 全画面フラッシュ（type: 'ok' | 'ng'）
function flashScreen(type) {
  const el = document.getElementById('flash');
  if (!el) return;
  el.className = 'flash';
  void el.offsetWidth; // リフロー強制でアニメーション再生をリセット
  el.className = 'flash ' + type;
}

// 日本語音声を事前選択（発話開始を速くする）
let jaVoice = null;
let speechWarmed = false;
function initVoices() {
  try {
    const vs = speechSynthesis.getVoices();
    jaVoice = vs.find(v => v.lang === 'ja-JP') || vs.find(v => (v.lang || '').toLowerCase().startsWith('ja')) || null;
  } catch (e) {}
}
if ('speechSynthesis' in window) {
  initVoices();
  speechSynthesis.onvoiceschanged = initVoices;
}

// NG読み上げ。発話終了後に onDone を必ず1回呼ぶ（安全タイマー付き）
function speakNG(message, onDone) {
  let done = false;
  const finish = () => { if (done) return; done = true; if (onDone) onDone(); };
  try {
    const u = new SpeechSynthesisUtterance(message);
    u.lang = 'ja-JP';
    if (jaVoice) u.voice = jaVoice;
    u.rate = 1.15;
    u.pitch = 1.0;
    u.volume = 1.0; // 音声合成APIの上限は1.0
    u.onend = finish;
    u.onerror = finish;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
    // 安全策：onend が来ない環境向け（発話長を概算 + 余裕）
    setTimeout(finish, Math.max(2500, message.length * 130 + 1800));
  } catch (e) {
    setTimeout(finish, 1500);
  }
}

// =========== スライダー共通 ===========
function makeSlider(sliderEl, thumbEl, fillEl, onComplete, thumbW) {
  thumbW = thumbW || 40;
  const margin = 3;
  let dragging = false, startX = 0, curX = 0;
  function getMax() { return sliderEl.offsetWidth - thumbW - margin * 2; }
  function start(e) {
    if (sliderEl.classList.contains('disabled')) return;
    dragging = true;
    startX = (e.touches ? e.touches[0].clientX : e.clientX) - curX;
    thumbEl.style.transition = 'none'; fillEl.style.transition = 'none';
  }
  function move(e) {
    if (!dragging) return;
    e.preventDefault();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    curX = Math.max(0, Math.min(getMax(), clientX - startX));
    thumbEl.style.transform = 'translateX(' + curX + 'px)';
    fillEl.style.width = (curX + thumbW + margin) + 'px';
    if (curX >= getMax() - 5) { finish(); }
  }
  function end() {
    if (!dragging) return;
    dragging = false;
    thumbEl.style.transition = ''; fillEl.style.transition = '';
    if (curX < getMax() - 5) { curX = 0; thumbEl.style.transform = 'translateX(0)'; fillEl.style.width = (thumbW + margin) + 'px'; }
  }
  function finish() {
    dragging = false;
    onComplete();
    setTimeout(() => { curX = 0; thumbEl.style.transform = 'translateX(0)'; fillEl.style.width = (thumbW + margin) + 'px'; }, 150);
  }
  thumbEl.addEventListener('touchstart', start, { passive: false });
  thumbEl.addEventListener('mousedown', start);
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('mousemove', move);
  document.addEventListener('touchend', end);
  document.addEventListener('mouseup', end);
}

// 読取はワンタップ（片手操作のため、誤操作防止のフリック操作は廃止）
document.getElementById('capture-btn').addEventListener('click', onCapture);

// 台車完了スライダー
makeSlider(
  document.getElementById('cart-complete-slider'),
  document.getElementById('cc-thumb'),
  document.getElementById('cc-fill'),
  completeCart
);

// アプリ終了スライダー
makeSlider(
  document.getElementById('slide-submit'),
  document.getElementById('end-thumb'),
  document.getElementById('end-fill'),
  completeApp
);

async function completeApp() {
  scanning = false;
  const endMsg = document.getElementById('end-message');
  if (GAS_URL) {
    endMsg.textContent = '送信中...';
    document.getElementById('main-app').classList.add('hidden');
    document.getElementById('end-app').classList.remove('hidden');
    let waited = 0;
    while (pendingCount > 0 && waited < 10000) { await new Promise(r => setTimeout(r, 200)); waited += 200; }
    if (failedCount > 0) {
      endMsg.textContent = '送信完了（成功:' + syncedCount + '件 失敗:' + failedCount + '件）失敗分はCSVで取得してください。';
    } else {
      endMsg.textContent = '全' + syncedCount + '件をスプレッドシートに保存しました。（台車' + totalCarts + '台完了）';
    }
  } else {
    endMsg.textContent = totalCarts + '台の台車を処理しました。CSVでダウンロードしてください。';
    document.getElementById('main-app').classList.add('hidden');
    document.getElementById('end-app').classList.remove('hidden');
  }
  if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); }
}

function downloadCSV() {
  const header = '日時,台車QR,差込口,製品ラベル,抽出台車,抽出差込口,結果,端末,同期\n';
  const rows = records.map(r =>
    '"' + r.time + '","' + r.cart + '","' + r.slot + '","' + (r.label||'').replace(/"/g, '""') + '","' + r.cartExtracted + '","' + r.slotExtracted + '",' + r.result + ',"' + r.device + '",' + r.syncStatus
  ).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'subako_' + new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

  showMain();
